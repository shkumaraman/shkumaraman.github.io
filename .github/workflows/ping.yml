name: Keep Render Awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping multiple times
        run: |
          curl -s https://youtube-0vra.onrender.com
          sleep 10
          curl -s https://youtube-0vra.onrender.com/search/videos?query=music
