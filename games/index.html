<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ludo Classic – Multiplayer</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --clr-red:#c62828; --clr-red-dark:#b71c1c; --clr-red-light:#ff8a80;
      --clr-green:#2e7d32; --clr-green-dark:#1b5e20; --clr-green-light:#69f0ae;
      --clr-yellow:#f9a825; --clr-yellow-dark:#e65100; --clr-yellow-light:#ffe57f;
      --clr-blue:#1565c0; --clr-blue-dark:#0d47a1; --clr-blue-light:#82b1ff;
      --clr-path:#f5f0e8; --clr-bg:#0d1117; --clr-board:#0d1620;
      --clr-wrap:#161d2b; --clr-border:#2a3f56;
      --clr-gold:#c9a84c; --clr-gold2:#e8d5b0;
      --dice-size:38px; --panel-bg:#111827; --panel-border:#1f2d3d;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--clr-bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;font-family:'Rajdhani',sans-serif;overflow-x:hidden;}

    /* SCREENS */
    .screen{display:none;width:100%;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:28px 16px;}
    .screen.active{display:flex;}
    #game-screen{justify-content:flex-start;padding-top:16px;gap:10px;}

    /* LOBBY */
    .lobby-title{font-family:'Cinzel Decorative',serif;font-size:clamp(1.3rem,4vw,2.2rem);color:var(--clr-gold);text-shadow:0 0 30px rgba(201,168,76,.35),0 2px 4px rgba(0,0,0,.8);letter-spacing:3px;margin-bottom:4px;text-align:center;}
    .lobby-sub{color:#3a5070;font-size:.72rem;letter-spacing:5px;text-transform:uppercase;margin-bottom:32px;text-align:center;}
    .lobby-card{background:var(--panel-bg);border:1px solid var(--panel-border);border-radius:18px;padding:28px;width:100%;max-width:420px;box-shadow:0 24px 56px rgba(0,0,0,.7);}
    .tabs{display:flex;gap:4px;background:rgba(255,255,255,.04);border-radius:10px;padding:4px;margin-bottom:26px;}
    .tab-btn{flex:1;padding:9px;border:none;border-radius:7px;background:transparent;color:#4a6080;font-family:'Rajdhani',sans-serif;font-size:.88rem;font-weight:600;letter-spacing:1px;cursor:pointer;transition:all .2s;text-transform:uppercase;}
    .tab-btn.active{background:var(--clr-gold);color:#0d1117;}
    .tab-panel{display:none;flex-direction:column;gap:14px;}
    .tab-panel.active{display:flex;}
    label{display:block;color:#4a7090;font-size:.7rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;font-weight:600;}
    input[type="text"]{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--panel-border);border-radius:8px;color:var(--clr-gold2);font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:600;padding:10px 13px;letter-spacing:1px;transition:border-color .2s;outline:none;}
    input[type="text"]:focus{border-color:var(--clr-gold);}
    input[type="text"]::placeholder{color:#2a3f56;}
    .mode-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
    .mode-btn{padding:9px 5px;border:1px solid var(--panel-border);border-radius:8px;background:transparent;color:#4a6080;font-family:'Rajdhani',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .2s;text-align:center;}
    .mode-btn.selected{border-color:var(--clr-gold);color:var(--clr-gold);background:rgba(201,168,76,.08);}
    .action-btn{width:100%;padding:12px;border:none;border-radius:9px;background:linear-gradient(135deg,#a07828,var(--clr-gold));color:#0d1117;font-family:'Rajdhani',sans-serif;font-size:.95rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-top:4px;}
    .action-btn:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(201,168,76,.25);}
    .action-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
    .error-msg{color:#e57373;font-size:.78rem;text-align:center;min-height:18px;}
    .divider{border:none;border-top:1px solid var(--panel-border);margin:2px 0;}

    /* WAITING */
    .waiting-card{background:var(--panel-bg);border:1px solid var(--panel-border);border-radius:18px;padding:28px;width:100%;max-width:440px;box-shadow:0 24px 56px rgba(0,0,0,.7);}
    .room-header{text-align:center;margin-bottom:22px;}
    .room-label{color:#4a6080;font-size:.68rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;}
    .room-code{font-family:'Courier New',Courier,monospace;font-size:2rem;font-weight:700;color:var(--clr-gold);letter-spacing:10px;cursor:pointer;user-select:all;}
    .room-mode-badge{display:inline-block;margin-top:8px;padding:3px 12px;border-radius:20px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.25);color:var(--clr-gold);font-size:.72rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
    .players-list{display:flex;flex-direction:column;gap:9px;margin-bottom:20px;}
    .player-slot{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid var(--panel-border);transition:border-color .3s;}
    .player-slot.filled{border-color:rgba(201,168,76,.2);}
    .player-color-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0;}
    .player-name{font-size:.95rem;font-weight:600;color:var(--clr-gold2);flex:1;}
    .player-name.empty{color:#2a3f56;font-style:italic;font-weight:400;}
    .player-you-tag{font-size:.62rem;letter-spacing:2px;color:var(--clr-gold);font-weight:700;text-transform:uppercase;}
    .host-tag{font-size:.62rem;letter-spacing:2px;color:#3a5070;font-weight:700;text-transform:uppercase;}
    .waiting-footer{text-align:center;}
    .waiting-dots{color:#3a5070;font-size:.78rem;letter-spacing:3px;animation:blink 1.4s ease-in-out infinite;}
    @keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
    .btn-row{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap;}
    .ghost-btn{background:rgba(255,255,255,.04);border:1px solid var(--panel-border);border-radius:7px;color:#4a7090;font-family:'Rajdhani',sans-serif;font-size:.72rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;padding:7px 14px;cursor:pointer;transition:all .2s;}
    .ghost-btn:hover{border-color:var(--clr-gold);color:var(--clr-gold);}
    .danger-btn{background:transparent;border:1px solid #2a2a2a;border-radius:7px;color:#444;font-family:'Rajdhani',sans-serif;font-size:.72rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;padding:7px 14px;cursor:pointer;transition:all .2s;}
    .danger-btn:hover{border-color:#c62828;color:#e57373;}

    /* GAME */
    .game-header{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:740px;padding:0 4px;}
    .game-title{font-family:'Cinzel Decorative',serif;font-size:.95rem;color:var(--clr-gold);letter-spacing:2px;}
    .game-room-badge{background:rgba(255,255,255,.04);border:1px solid var(--panel-border);border-radius:6px;color:#3a5070;font-family:'Courier New',monospace;font-size:.78rem;letter-spacing:3px;padding:4px 10px;font-weight:700;}
    .name-bar{display:flex;justify-content:space-between;width:100%;max-width:740px;gap:6px;}
    .ptag{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:8px;background:rgba(255,255,255,.03);border:1px solid var(--panel-border);font-size:.78rem;font-weight:600;white-space:nowrap;opacity:.38;transition:opacity .3s,border-color .3s;}
    .ptag.active{opacity:1;}
    .ptag.hidden{opacity:0;pointer-events:none;}
    .ptag-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .ptag-red{color:var(--clr-red-light);} .ptag-red.active{border-color:rgba(198,40,40,.55);}
    .ptag-green{color:var(--clr-green-light);} .ptag-green.active{border-color:rgba(46,125,50,.55);}
    .ptag-yellow{color:var(--clr-yellow-light);} .ptag-yellow.active{border-color:rgba(249,168,37,.55);}
    .ptag-blue{color:var(--clr-blue-light);} .ptag-blue.active{border-color:rgba(21,101,192,.55);}
    .turn-bar{width:100%;max-width:740px;display:flex;align-items:center;justify-content:center;}
    .turn-label{font-size:.78rem;color:var(--clr-gold);letter-spacing:3px;text-transform:uppercase;font-weight:700;text-align:center;}

    /* BOARD */
    .board-wrap{background:var(--clr-wrap);padding:11px;border-radius:18px;box-shadow:0 20px 44px rgba(0,0,0,.8),inset 0 0 0 2px var(--clr-border);}
    .ludo-board{display:grid;grid-template-columns:repeat(15,44px);grid-template-rows:repeat(15,44px);gap:2px;background:var(--clr-board);padding:2px;border-radius:8px;position:relative;}
    .cell{width:44px;height:44px;border-radius:5px;position:relative;display:flex;justify-content:center;align-items:center;}
    .f-r{background:var(--clr-red);box-shadow:inset 0 0 0 1px var(--clr-red-light);}
    .f-g{background:var(--clr-green);box-shadow:inset 0 0 0 1px var(--clr-green-light);}
    .f-y{background:var(--clr-yellow);box-shadow:inset 0 0 0 1px var(--clr-yellow-light);}
    .f-b{background:var(--clr-blue);box-shadow:inset 0 0 0 1px var(--clr-blue-light);}
    .s-r{background:var(--clr-red)!important;box-shadow:inset 0 0 0 2px var(--clr-red-light)!important;}
    .s-g{background:var(--clr-green)!important;box-shadow:inset 0 0 0 2px var(--clr-green-light)!important;}
    .s-y{background:var(--clr-yellow)!important;box-shadow:inset 0 0 0 2px var(--clr-yellow-light)!important;}
    .s-b{background:var(--clr-blue)!important;box-shadow:inset 0 0 0 2px var(--clr-blue-light)!important;}
    .p{background:var(--clr-path);}
    .safe{background:var(--clr-path);}
    .safe::after{content:'★';font-size:13px;color:#aaa;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}
    .win-house{grid-column:7/10;grid-row:7/10;width:138px;height:138px;border-radius:10px;overflow:hidden;z-index:10;background:var(--clr-path);box-shadow:0 0 0 3px var(--clr-board),0 4px 16px rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;font-size:56px;}
    .home-card{border-radius:10px;position:relative;z-index:5;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);gap:3px;padding:6px;box-shadow:0 4px 20px rgba(0,0,0,.5),inset 0 0 0 2px rgba(255,255,255,.13);}
    .home-card.red{background:linear-gradient(135deg,var(--clr-red-dark),var(--clr-red));grid-column:1/7;grid-row:1/7;}
    .home-card.green{background:linear-gradient(135deg,var(--clr-green-dark),var(--clr-green));grid-column:10/16;grid-row:1/7;}
    .home-card.yellow{background:linear-gradient(135deg,var(--clr-yellow-dark),var(--clr-yellow));grid-column:1/7;grid-row:10/16;}
    .home-card.blue{background:linear-gradient(135deg,var(--clr-blue-dark),var(--clr-blue));grid-column:10/16;grid-row:10/16;}
    .home-cell{border-radius:3px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;}
    .dice-cell{grid-column:2/4;grid-row:2/4;background:transparent;border:none;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;cursor:pointer;}
    .dice-cell.disabled{opacity:.35;cursor:not-allowed;pointer-events:none;}

    /* DICE */
    .dice-scene{width:var(--dice-size);height:var(--dice-size);perspective:160px;cursor:pointer;}
    .dice-cube{width:100%;height:100%;position:relative;transform-style:preserve-3d;transform:rotateX(-20deg) rotateY(30deg);}
    .dice-cube.spinning{animation:diceRoll .7s cubic-bezier(.25,.46,.45,.94) forwards;}
    @keyframes diceRoll{
      0%{transform:rotateX(-20deg) rotateY(30deg);}
      20%{transform:rotateX(200deg) rotateY(150deg) rotateZ(60deg);}
      50%{transform:rotateX(500deg) rotateY(400deg) rotateZ(180deg);}
      80%{transform:rotateX(680deg) rotateY(560deg) rotateZ(240deg);}
      100%{transform:var(--dice-final);}
    }
    .dice-face{position:absolute;width:var(--dice-size);height:var(--dice-size);border-radius:6px;background:#f5f0e8;border:2px solid rgba(0,0,0,.15);display:grid;padding:5px;box-shadow:inset 0 0 6px rgba(0,0,0,.12);}
    .face-1{transform:translateZ(calc(var(--dice-size)/2));}
    .face-6{transform:rotateY(180deg) translateZ(calc(var(--dice-size)/2));}
    .face-2{transform:rotateY(90deg) translateZ(calc(var(--dice-size)/2));}
    .face-5{transform:rotateY(-90deg) translateZ(calc(var(--dice-size)/2));}
    .face-3{transform:rotateX(-90deg) translateZ(calc(var(--dice-size)/2));}
    .face-4{transform:rotateX(90deg) translateZ(calc(var(--dice-size)/2));}
    .face-1{grid-template-areas:'. . .''. c .''. . .';}
    .face-2{grid-template-areas:'. . a''. . .''b . .';}
    .face-3{grid-template-areas:'. . a''. c .''b . .';}
    .face-4{grid-template-areas:'a . b''. . .''c . d';}
    .face-5{grid-template-areas:'a . b''. c .''d . e';}
    .face-6{grid-template-areas:'a . b''c . d''e . f';}
    .dot{width:6px;height:6px;border-radius:50%;background:#1a1a1a;box-shadow:0 1px 2px rgba(0,0,0,.4);justify-self:center;align-self:center;}
    .face-1 .dot:nth-child(1){grid-area:c;}
    .face-2 .dot:nth-child(1){grid-area:a;}.face-2 .dot:nth-child(2){grid-area:b;}
    .face-3 .dot:nth-child(1){grid-area:a;}.face-3 .dot:nth-child(2){grid-area:c;}.face-3 .dot:nth-child(3){grid-area:b;}
    .face-4 .dot:nth-child(1){grid-area:a;}.face-4 .dot:nth-child(2){grid-area:b;}.face-4 .dot:nth-child(3){grid-area:c;}.face-4 .dot:nth-child(4){grid-area:d;}
    .face-5 .dot:nth-child(1){grid-area:a;}.face-5 .dot:nth-child(2){grid-area:b;}.face-5 .dot:nth-child(3){grid-area:c;}.face-5 .dot:nth-child(4){grid-area:d;}.face-5 .dot:nth-child(5){grid-area:e;}
    .face-6 .dot:nth-child(1){grid-area:a;}.face-6 .dot:nth-child(2){grid-area:b;}.face-6 .dot:nth-child(3){grid-area:c;}.face-6 .dot:nth-child(4){grid-area:d;}.face-6 .dot:nth-child(5){grid-area:e;}.face-6 .dot:nth-child(6){grid-area:f;}
    .token{width:70%;height:70%;border-radius:50%;box-shadow:0 3px 7px rgba(0,0,0,.7),inset 0 2px 3px rgba(255,255,255,.45);border:2px solid rgba(255,255,255,.5);}
    .t-r{background:radial-gradient(circle at 35% 35%,var(--clr-red-light),var(--clr-red-dark));}
    .t-g{background:radial-gradient(circle at 35% 35%,var(--clr-green-light),var(--clr-green-dark));}
    .t-y{background:radial-gradient(circle at 35% 35%,var(--clr-yellow-light),var(--clr-yellow-dark));}
    .t-b{background:radial-gradient(circle at 35% 35%,var(--clr-blue-light),var(--clr-blue-dark));}

    /* TOAST */
    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(90px);background:#1a2535;border:1px solid var(--panel-border);border-radius:10px;padding:10px 20px;color:var(--clr-gold2);font-size:.84rem;letter-spacing:.8px;font-weight:600;z-index:9000;transition:transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none;}
    #toast.show{transform:translateX(-50%) translateY(0);}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(201,168,76,.3);border-top-color:var(--clr-gold);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:5px;}
    @keyframes spin{to{transform:rotate(360deg)}}

    @media(max-width:680px){
      .ludo-board{grid-template-columns:repeat(15,29px);grid-template-rows:repeat(15,29px);}
      .cell{width:29px;height:29px;border-radius:3px;}
      .win-house{width:91px;height:91px;font-size:36px;}
    }
  </style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby-screen" class="screen active">
  <div class="lobby-title">◈ Ludo Classic ◈</div>
  <div class="lobby-sub">Multiplayer Edition</div>
  <div class="lobby-card">
    <div class="tabs">
      <button class="tab-btn active" id="tab-create-btn" onclick="switchTab('create')">Create Room</button>
      <button class="tab-btn"        id="tab-join-btn"   onclick="switchTab('join')">Join Room</button>
    </div>
    <div class="tab-panel active" id="tab-create">
      <div><label>Your Name</label><input type="text" id="create-name" placeholder="Enter your name" maxlength="16"></div>
      <div><label>Room Name</label><input type="text" id="room-name" placeholder="e.g. Friday Night Ludo" maxlength="24"></div>
      <div>
        <label>Game Mode</label>
        <div class="mode-grid">
          <button class="mode-btn selected" data-mode="1v1">1 vs 1</button>
          <button class="mode-btn"          data-mode="2v2">2 vs 2</button>
          <button class="mode-btn"          data-mode="ffa">Free For All</button>
        </div>
      </div>
      <hr class="divider">
      <div class="error-msg" id="create-error"></div>
      <button class="action-btn" id="create-btn" onclick="createRoom()">Create Room</button>
    </div>
    <div class="tab-panel" id="tab-join">
      <div><label>Your Name</label><input type="text" id="join-name" placeholder="Enter your name" maxlength="16"></div>
      <div><label>Room Code</label><input type="text" id="join-code" placeholder="e.g. AB12" maxlength="6" style="text-transform:uppercase;letter-spacing:4px;font-family:'Courier New',monospace;"></div>
      <hr class="divider">
      <div class="error-msg" id="join-error"></div>
      <button class="action-btn" id="join-btn" onclick="joinRoom()">Join Room</button>
    </div>
  </div>
</div>

<!-- WAITING ROOM -->
<div id="waiting-screen" class="screen">
  <div class="waiting-card">
    <div class="room-header">
      <div class="room-label">Room Code — click to copy</div>
      <div class="room-code" id="display-room-code" onclick="copyCode()">XXXX</div>
      <div class="room-mode-badge" id="display-mode">1v1</div>
    </div>
    <div class="players-list" id="players-list"></div>
    <div class="waiting-footer">
      <div class="waiting-dots" id="waiting-text">Waiting for players…</div>
      <div class="btn-row">
        <button class="ghost-btn" onclick="copyCode()">⧉ Copy Code</button>
        <button class="ghost-btn" onclick="shareLink()">↗ Share Link</button>
        <button class="danger-btn" onclick="leaveRoom()">Leave</button>
      </div>
    </div>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="game-screen" class="screen">
  <div class="game-header">
    <div class="game-title">◈ Ludo Classic</div>
    <div class="game-room-badge" id="game-room-badge">XXXX</div>
  </div>
  <div class="name-bar">
    <div class="ptag ptag-red    hidden" id="ptag-red">   <div class="ptag-dot" style="background:#c62828"></div><span id="ptag-red-name">—</span></div>
    <div class="ptag ptag-green  hidden" id="ptag-green">  <div class="ptag-dot" style="background:#2e7d32"></div><span id="ptag-green-name">—</span></div>
  </div>
  <div class="board-wrap">
    <div class="ludo-board" id="board">
      <div class="win-house">🏆</div>
      <div class="home-card red"    id="card-r"></div>
      <div class="home-card green"  id="card-g"></div>
      <div class="home-card yellow" id="card-y"></div>
      <div class="home-card blue"   id="card-b"></div>
    </div>
  </div>
  <div class="name-bar">
    <div class="ptag ptag-yellow hidden" id="ptag-yellow"> <div class="ptag-dot" style="background:#f9a825"></div><span id="ptag-yellow-name">—</span></div>
    <div class="ptag ptag-blue   hidden" id="ptag-blue">   <div class="ptag-dot" style="background:#1565c0"></div><span id="ptag-blue-name">—</span></div>
  </div>
  <div class="turn-bar">
    <div class="turn-label" id="turn-label">—</div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue, remove }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app = initializeApp({ databaseURL:"https://talkrush-76259-default-rtdb.asia-southeast1.firebasedatabase.app/" });
const db  = getDatabase(app);

const COLORS    = ['red','green','yellow','blue'];
const COLOR_HEX = { red:'#c62828', green:'#2e7d32', yellow:'#f9a825', blue:'#1565c0' };
const TOKEN_CLS = { red:'t-r', green:'t-g', yellow:'t-y', blue:'t-b' };
const CARD_IDS  = { red:'card-r', green:'card-g', yellow:'card-y', blue:'card-b' };
const MODE_SLOTS= { '1v1':2, '2v2':4, 'ffa':4 };
const FACE_T    = {
  1:'rotateX(-20deg) rotateY(30deg)',
  2:'rotateX(-20deg) rotateY(-90deg)',
  3:'rotateX(90deg) rotateY(30deg)',
  4:'rotateX(-90deg) rotateY(30deg)',
  5:'rotateX(-20deg) rotateY(90deg)',
  6:'rotateX(-20deg) rotateY(210deg)',
};

let myUid='', myName='', myColor='', roomCode='';
let roomUnsub=null, boardBuilt=false, selectedMode='1v1';

/* ── helpers ── */
const mkUid = ()=> Math.random().toString(36).slice(2,9)+Date.now().toString(36);
const mkCode= ()=> Math.random().toString(36).toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,4) || 'LUDO';

function toast(msg,dur=2600){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._tid);
  t._tid=setTimeout(()=>t.classList.remove('show'),dur);
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('active',s.id===id));
}

function setBtnLoad(id,loading,label){
  const b=document.getElementById(id); if(!b)return;
  b.disabled=loading;
  b.innerHTML=loading?`<span class="spinner"></span>Please wait…`:label;
}

/* ── mode buttons ── */
document.querySelectorAll('.mode-btn').forEach(btn=>btn.addEventListener('click',()=>{
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected'); selectedMode=btn.dataset.mode;
}));

/* ── tab switch ── */
window.switchTab=function(tab){
  ['create','join'].forEach(t=>{
    document.getElementById('tab-'+t+'-btn').classList.toggle('active',t===tab);
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
  });
};

/* ── URL ?id= auto-fill ── */
const urlCode=new URLSearchParams(location.search).get('id');
if(urlCode){ switchTab('join'); document.getElementById('join-code').value=urlCode.toUpperCase(); }

/* ── subscribe ── */
function subscribeToRoom(code){
  if(roomUnsub){roomUnsub();roomUnsub=null;}
  roomUnsub=onValue(ref(db,'rooms/'+code),snap=>{
    const room=snap.val();
    if(!room){ toast('Room closed.'); showScreen('lobby-screen'); localStorage.removeItem('ludo_session'); return; }
    const players=Object.values(room.players||{}).sort((a,b)=>a.joinedAt-b.joinedAt);
    if(room.status==='waiting')      renderWaiting(players,room.mode,code);
    else if(room.status==='playing') renderGame(players,room);
  });
}

/* ── waiting room ── */
function renderWaiting(players,mode,rCode){
  showScreen('waiting-screen');
  document.getElementById('display-room-code').textContent=rCode;
  const labels={'1v1':'1 vs 1','2v2':'2 vs 2','ffa':'Free For All'};
  document.getElementById('display-mode').textContent=labels[mode]||mode;

  const slots=MODE_SLOTS[mode]||2;
  const list=document.getElementById('players-list');
  list.innerHTML='';
  for(let i=0;i<slots;i++){
    const p=players[i], color=COLORS[i];
    const slot=document.createElement('div');
    slot.className='player-slot'+(p?' filled':'');
    const dot=document.createElement('div');
    dot.className='player-color-dot'; dot.style.background=COLOR_HEX[color];
    const nm=document.createElement('div');
    nm.className='player-name'+(p?'':' empty');
    nm.textContent=p?p.name:'Waiting…';
    slot.appendChild(dot); slot.appendChild(nm);
    if(p){
      if(p.uid===myUid){const y=document.createElement('span');y.className='player-you-tag';y.textContent='YOU';slot.appendChild(y);}
      else if(i===0){const h=document.createElement('span');h.className='host-tag';h.textContent='HOST';slot.appendChild(h);}
    }
    list.appendChild(slot);
  }
  const filled=players.filter(Boolean).length;
  const wt=document.getElementById('waiting-text');
  if(filled>=slots){
    wt.textContent='All players joined! Starting…';
    if(players[0]?.uid===myUid) setTimeout(startGame,1500);
  } else {
    wt.textContent='Waiting for players… ('+filled+'/'+slots+')';
  }
}

/* ── create room ── */
window.createRoom=async function(){
  const name=document.getElementById('create-name').value.trim();
  const rName=document.getElementById('room-name').value.trim();
  const err=document.getElementById('create-error');
  err.textContent='';
  if(!name){err.textContent='Please enter your name.';return;}
  if(!rName){err.textContent='Please enter a room name.';return;}
  setBtnLoad('create-btn',true,'Create Room');
  myUid=mkUid(); myName=name; myColor=COLORS[0]; roomCode=mkCode();
  try{
    await set(ref(db,'rooms/'+roomCode),{
      name:rName,mode:selectedMode,status:'waiting',createdAt:Date.now(),
      players:{[myUid]:{uid:myUid,name:myName,color:myColor,joinedAt:Date.now()}}
    });
    saveSession(); setBtnLoad('create-btn',false,'Create Room');
    subscribeToRoom(roomCode);
  }catch(e){err.textContent='Failed. Check connection.';setBtnLoad('create-btn',false,'Create Room');}
};

/* ── join room ── */
window.joinRoom=async function(){
  const name=document.getElementById('join-name').value.trim();
  const rCode=document.getElementById('join-code').value.trim().toUpperCase();
  const err=document.getElementById('join-error');
  err.textContent='';
  if(!name){err.textContent='Please enter your name.';return;}
  if(!rCode){err.textContent='Please enter a room code.';return;}
  setBtnLoad('join-btn',true,'Join Room');
  try{
    const snap=await get(ref(db,'rooms/'+rCode));
    const room=snap.val();
    if(!room){err.textContent='Room not found.';setBtnLoad('join-btn',false,'Join Room');return;}
    if(room.status!=='waiting'){err.textContent='Game already started.';setBtnLoad('join-btn',false,'Join Room');return;}
    const players=Object.values(room.players||{});
    if(players.length>=(MODE_SLOTS[room.mode]||2)){err.textContent='Room is full.';setBtnLoad('join-btn',false,'Join Room');return;}
    myUid=mkUid(); myName=name; myColor=COLORS[players.length]; roomCode=rCode;
    await set(ref(db,'rooms/'+rCode+'/players/'+myUid),{uid:myUid,name:myName,color:myColor,joinedAt:Date.now()});
    saveSession(); setBtnLoad('join-btn',false,'Join Room');
    subscribeToRoom(rCode);
  }catch(e){err.textContent='Failed. Check connection.';setBtnLoad('join-btn',false,'Join Room');}
};

function saveSession(){
  localStorage.setItem('ludo_session',JSON.stringify({myUid,myName,myColor,roomCode}));
}

window.leaveRoom=async function(){
  try{
    const snap=await get(ref(db,'rooms/'+roomCode));
    const room=snap.val();
    const players=Object.values(room?.players||{}).sort((a,b)=>a.joinedAt-b.joinedAt);
    if(players[0]?.uid===myUid) await remove(ref(db,'rooms/'+roomCode));
    else await remove(ref(db,'rooms/'+roomCode+'/players/'+myUid));
  }catch(e){}
  if(roomUnsub){roomUnsub();roomUnsub=null;}
  localStorage.removeItem('ludo_session');
  showScreen('lobby-screen');
};

window.copyCode=function(){
  navigator.clipboard.writeText(roomCode).then(()=>toast('✓ Code copied!'));
};

window.shareLink=function(){
  const url=location.origin+location.pathname+'?id='+roomCode;
  if(navigator.share){
    navigator.share({title:'Join my Ludo game!',text:'Room: '+roomCode,url}).catch(()=>{});
  } else {
    navigator.clipboard.writeText(url).then(()=>toast('✓ Link copied!'));
  }
};

async function startGame(){
  await update(ref(db,'rooms/'+roomCode),{status:'playing'});
}

/* ── render game ── */
function renderGame(players,room){
  showScreen('game-screen');
  document.getElementById('game-room-badge').textContent=roomCode;

  if(!boardBuilt){
    boardBuilt=true;
    buildBoard();
    COLORS.forEach(c=>buildDice(CARD_IDS[c],TOKEN_CLS[c],c));
  }

  const playerMap={};
  players.forEach(p=>{ playerMap[p.color]=p; });

  COLORS.forEach(color=>{
    const p=playerMap[color];
    const tag=document.getElementById('ptag-'+color);
    const nm=document.getElementById('ptag-'+color+'-name');
    if(!tag||!nm)return;
    if(!p){ tag.classList.add('hidden'); return; }
    tag.classList.remove('hidden');
    nm.textContent=p.name+(p.uid===myUid?' (You)':'');
  });

  const turn=room.currentTurn||players[0]?.color||'red';
  applyTurn(turn,playerMap);
}

function applyTurn(color,playerMap){
  const p=playerMap[color];
  const isMe=p?.uid===myUid;
  document.getElementById('turn-label').textContent=isMe?'🎲 Your Turn!':((p?.name||color)+"'s Turn");
  COLORS.forEach(c=>{
    const tag=document.getElementById('ptag-'+c);
    if(tag) tag.classList.toggle('active',c===color);
    const dc=document.getElementById('dice-cell-'+c);
    if(dc) dc.classList.toggle('disabled',!(c===color&&isMe));
  });
}

/* ── board cells ── */
function buildBoard(){
  const SAFE=new Set(['6,12','8,2','2,6','12,8']);
  const board=document.getElementById('board');
  function isHomeQ(r,c){return(r<=5&&c<=5)||(r<=5&&c>=9)||(r>=9&&c<=5)||(r>=9&&c>=9);}
  function isCtr(r,c){return r>=6&&r<=8&&c>=6&&c<=8;}
  function classOf(r,c){
    const k=r+','+c;
    if(r===6&&c===1)  return 'p s-r';
    if(r===1&&c===8)  return 'p s-g';
    if(r===8&&c===13) return 'p s-b';
    if(r===13&&c===6) return 'p s-y';
    if(r===7&&c>=1&&c<=5)  return 'f-r';
    if(c===7&&r>=1&&r<=5)  return 'f-g';
    if(r===7&&c>=9&&c<=13) return 'f-b';
    if(c===7&&r>=9&&r<=13) return 'f-y';
    if(SAFE.has(k)) return 'safe';
    return 'p';
  }
  for(let r=0;r<15;r++)for(let c=0;c<15;c++){
    if(isCtr(r,c)||isHomeQ(r,c)) continue;
    const d=document.createElement('div');
    d.className='cell '+classOf(r,c);
    d.style.gridColumn=c+1; d.style.gridRow=r+1;
    board.appendChild(d);
  }
}

/* ── dice per home card ── */
function buildDice(cardId,tokenCls,colorName){
  const card=document.getElementById(cardId);
  if(!card)return;
  card.innerHTML='';
  for(let i=0;i<16;i++){
    const row=Math.floor(i/4),col=i%4;
    if((row===1||row===2)&&(col===1||col===2))continue;
    const cell=document.createElement('div');
    cell.className='home-cell';
    if((row===0||row===3)&&(col===0||col===3)){
      const t=document.createElement('div');
      t.className='token '+tokenCls; cell.appendChild(t);
    }
    cell.style.gridColumn=col+1; cell.style.gridRow=row+1;
    card.appendChild(cell);
  }
  const dc=document.createElement('div');
  dc.className='home-cell dice-cell disabled';
  dc.id='dice-cell-'+colorName;
  dc.style.gridColumn='2/4'; dc.style.gridRow='2/4';
  const scene=document.createElement('div'); scene.className='dice-scene';
  const cube=document.createElement('div');  cube.className='dice-cube';
  cube.style.setProperty('--dice-final',FACE_T[1]);
  for(let f=1;f<=6;f++){
    const face=document.createElement('div');
    face.className='dice-face face-'+f;
    for(let d=0;d<f;d++){const dot=document.createElement('div');dot.className='dot';face.appendChild(dot);}
    cube.appendChild(face);
  }
  scene.appendChild(cube); dc.appendChild(scene); card.appendChild(dc);

  let rolling=false;
  dc.addEventListener('click',async()=>{
    if(rolling||dc.classList.contains('disabled'))return;
    rolling=true;
    const val=Math.floor(Math.random()*6)+1;
    cube.style.setProperty('--dice-final',FACE_T[val]);
    cube.classList.remove('spinning');
    void cube.offsetWidth;
    cube.classList.add('spinning');
    cube.addEventListener('animationend',async()=>{
      cube.classList.remove('spinning');
      cube.style.transform=FACE_T[val];
      rolling=false;
      toast('🎲 '+myName+' rolled '+val+'!');
      await update(ref(db,'rooms/'+roomCode),{lastRoll:{uid:myUid,color:colorName,value:val,at:Date.now()}});
      const snap=await get(ref(db,'rooms/'+roomCode));
      const room=snap.val();
      const ordered=Object.values(room.players||{}).sort((a,b)=>a.joinedAt-b.joinedAt);
      const cols=ordered.map(p=>p.color);
      const next=cols[(cols.indexOf(colorName)+1)%cols.length];
      await update(ref(db,'rooms/'+roomCode),{currentTurn:next});
    },{once:true});
  });
}

/* ── restore session ── */
try{
  const saved=JSON.parse(localStorage.getItem('ludo_session')||'null');
  if(saved?.myUid){
    myUid=saved.myUid; myName=saved.myName;
    myColor=saved.myColor; roomCode=saved.roomCode;
    subscribeToRoom(roomCode);
  } else showScreen('lobby-screen');
}catch(e){showScreen('lobby-screen');}
</script>
</body>
</html>
