<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Notifications</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c27;
      --border: #2a2a3d;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --text: #e8e8f0;
      --muted: #7878a0;
      --success: #4ade80;
      --error: #f87171;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(108,99,255,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -150px; right: -150px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(255,101,132,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .container { width: 100%; max-width: 520px; position: relative; z-index: 1; }
    .header { text-align: center; margin-bottom: 36px; }
    .badge {
      display: inline-block;
      font-family: 'Syne', sans-serif;
      font-size: 11px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--accent);
      background: rgba(108,99,255,0.1);
      border: 1px solid rgba(108,99,255,0.3);
      padding: 6px 16px; border-radius: 100px; margin-bottom: 16px;
    }
    .header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 36px; font-weight: 800;
      letter-spacing: -1px; line-height: 1.1;
    }
    .header h1 span { color: var(--accent); }
    .header p { color: var(--muted); font-size: 14px; margin-top: 8px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px; padding: 32px;
    }
    .field { margin-bottom: 20px; }
    label {
      display: block; font-size: 12px; font-weight: 500;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 8px;
    }
    input[type="text"], textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; padding: 13px 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none; resize: none;
    }
    input[type="text"]:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
    }
    input::placeholder, textarea::placeholder { color: var(--muted); opacity: 0.6; }
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 12px; padding: 28px;
      text-align: center; cursor: pointer;
      transition: all 0.2s; position: relative;
      background: var(--surface2);
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--accent);
      background: rgba(108,99,255,0.05);
    }
    .upload-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0;
      cursor: pointer; width: 100%; height: 100%;
    }
    .upload-icon {
      width: 40px; height: 40px;
      background: rgba(108,99,255,0.15);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 12px;
    }
    .upload-zone p { color: var(--muted); font-size: 13px; }
    .upload-zone strong { color: var(--accent); font-weight: 500; }
    .upload-progress { margin-top: 10px; display: none; }
    .upload-progress.active { display: block; }
    .progress-bar { height: 4px; background: var(--border); border-radius: 100px; overflow: hidden; }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 100px; width: 0%;
      transition: width 0.3s ease;
    }
    .progress-text { font-size: 12px; color: var(--muted); margin-top: 6px; }
    .preview-wrap { margin-top: 14px; display: none; position: relative; }
    .preview-wrap.has-image { display: block; }
    .preview-wrap img {
      width: 100%; max-height: 180px;
      object-fit: cover; border-radius: 10px;
      border: 1px solid var(--border);
    }
    .preview-remove {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,0,0,0.7); border: none;
      border-radius: 50%; width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: white; transition: background 0.2s;
    }
    .preview-remove:hover { background: var(--error); }
    .divider { display: flex; align-items: center; gap: 12px; margin: 16px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider span { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .btn-send {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border: none; border-radius: 12px;
      color: white; font-family: 'Syne', sans-serif;
      font-size: 15px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
      margin-top: 8px; position: relative; overflow: hidden;
    }
    .btn-send:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(108,99,255,0.4); }
    .btn-send:active { transform: scale(0.98); }
    .btn-send:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-send.loading .btn-text { opacity: 0; }
    .btn-send .spinner {
      position: absolute; width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.8s linear infinite; display: none;
    }
    .btn-send.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .char-count { text-align: right; font-size: 11px; color: var(--muted); margin-top: 4px; }
    .char-count.warn { color: var(--accent2); }
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 20px;
      font-size: 14px; display: flex; align-items: center; gap: 10px;
      z-index: 999; transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4); white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: rgba(74,222,128,0.3); }
    .toast.error { border-color: rgba(248,113,113,0.3); }
    .toast .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .toast.success .dot { background: var(--success); }
    .toast.error .dot { background: var(--error); }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="badge">Admin Panel</div>
    <h1>Push <span>Notify</span></h1>
    <p>Send instant notifications to all subscribers</p>
  </div>

  <div class="card">
    <div class="field">
      <label>Notification Title</label>
      <input type="text" id="title" placeholder="Enter notification title..." maxlength="100" oninput="updateCount(this,'titleCount',100)">
      <div class="char-count" id="titleCount">0 / 100</div>
    </div>

    <div class="field">
      <label>Message</label>
      <textarea id="message" placeholder="Write your notification message..." rows="3" maxlength="300" oninput="updateCount(this,'msgCount',300)"></textarea>
      <div class="char-count" id="msgCount">0 / 300</div>
    </div>

    <div class="field">
      <label>Notification Image</label>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">
        <div class="upload-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6c63ff" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </div>
        <p><strong>Click to upload</strong> or drag & drop</p>
        <p style="margin-top:4px;font-size:12px">PNG, JPG, GIF up to 32MB</p>
      </div>

      <div class="upload-progress" id="uploadProgress">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressText">Uploading to imgbb...</div>
      </div>

      <div class="preview-wrap" id="previewWrap">
        <img id="previewImg" src="" alt="Preview">
        <button class="preview-remove" onclick="removeImage()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>

    <div class="divider"><span>or paste image URL</span></div>

    <div class="field">
      <input type="text" id="imageUrl" placeholder="https://example.com/image.jpg" oninput="onUrlInput(this)">
    </div>

    <button class="btn-send" id="sendBtn" onclick="sendNotification()">
      <span class="btn-text">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="display:inline;vertical-align:middle;margin-right:6px"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Send Notification
      </span>
      <div class="spinner"></div>
    </button>
  </div>
</div>

<div class="toast" id="toast">
  <div class="dot"></div>
  <span id="toastMsg"></span>
</div>

<script>
  // OneSignal keys hardcoded (CORS fix — not fetched from key.json)
  const ONESIGNAL_APP_ID  = "118b3675-8df8-474d-9fb5-1af80c929f11";
  const ONESIGNAL_API_KEY = "os_v2_app_cgftm5mn7bdu3h5vdl4azeu7cf3kv34fuqqu5pmenqaf2ibrfpfemuk3yx2oofsehchylofekayojwpg24hih2gpboqh54b5gt5hz7y";

  // Other keys loaded from key.json
  let IMGBB_API_KEY = '';
  let uploadedImageUrl = '';

  async function loadKeys() {
    try {
      const res = await fetch('/key.json');
      const data = await res.json();
      IMGBB_API_KEY = data.imgbb || '';
    } catch (err) {
      console.warn('key.json load failed, imgbb upload unavailable:', err);
    }
  }
  loadKeys();

  function updateCount(el, id, max) {
    const el2 = document.getElementById(id);
    el2.textContent = `${el.value.length} / ${max}`;
    el2.classList.toggle('warn', el.value.length > max * 0.85);
  }

  const zone = document.getElementById('uploadZone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) uploadToImgbb(file);
  });

  function handleFileSelect(e) {
    const file = e.target.files[0];
    if (file) uploadToImgbb(file);
  }

  async function uploadToImgbb(file) {
    const progress = document.getElementById('uploadProgress');
    const fill     = document.getElementById('progressFill');
    const text     = document.getElementById('progressText');

    progress.classList.add('active');
    fill.style.width = '0%';
    text.textContent = 'Uploading to imgbb...';

    let prog = 0;
    const interval = setInterval(() => {
      prog = Math.min(prog + Math.random() * 12, 85);
      fill.style.width = prog + '%';
    }, 200);

    try {
      const formData = new FormData();
      formData.append('image', file);

      const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
        method: 'POST',
        body: formData
      });

      clearInterval(interval);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      if (!data.success) throw new Error(data.error?.message || 'Upload failed');

      fill.style.width = '100%';
      text.textContent = 'Upload complete!';

      uploadedImageUrl = data.data.url;
      document.getElementById('imageUrl').value = '';
      document.getElementById('previewImg').src = uploadedImageUrl;
      document.getElementById('previewWrap').classList.add('has-image');

      setTimeout(() => progress.classList.remove('active'), 900);
      showToast('Image uploaded successfully!', 'success');

    } catch (err) {
      clearInterval(interval);
      progress.classList.remove('active');
      showToast('Upload failed: ' + err.message, 'error');
    }
  }

  function removeImage() {
    uploadedImageUrl = '';
    document.getElementById('previewWrap').classList.remove('has-image');
    document.getElementById('previewImg').src = '';
    document.getElementById('fileInput').value = '';
    document.getElementById('imageUrl').value = '';
  }

  function onUrlInput(el) {
    if (el.value.trim()) {
      uploadedImageUrl = '';
      document.getElementById('previewWrap').classList.remove('has-image');
    }
  }

  async function sendNotification() {
    const title    = document.getElementById('title').value.trim();
    const message  = document.getElementById('message').value.trim();
    const imageUrl = uploadedImageUrl || document.getElementById('imageUrl').value.trim();

    if (!title || !message) return showToast('Title and message are required!', 'error');

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    btn.classList.add('loading');

    const payload = {
      app_id: ONESIGNAL_APP_ID,
      headings: { en: title },
      contents: { en: message },
      included_segments: ["Subscribed Users"]
    };
    if (imageUrl) {
      payload.chrome_web_image = imageUrl;
      payload.big_picture      = imageUrl;
      payload.ios_attachments  = { id: imageUrl };
    }

    try {
      const res = await fetch("https://onesignal.com/api/v1/notifications", {
        method: "POST",
        headers: {
          "Content-Type": "application/json; charset=utf-8",
          "Authorization": "Basic " + ONESIGNAL_API_KEY
        },
        body: JSON.stringify(payload)
      });

      const data = await res.json();

      if (res.ok && data.id) {
        showToast('Sent to ' + (data.recipients || 0) + ' recipients!', 'success');
        document.getElementById('title').value = '';
        document.getElementById('message').value = '';
        document.getElementById('titleCount').textContent = '0 / 100';
        document.getElementById('msgCount').textContent   = '0 / 300';
        removeImage();
      } else {
        const errMsg = data.errors?.[0] || JSON.stringify(data);
        showToast('Error: ' + errMsg, 'error');
      }
    } catch (err) {
      showToast('Network error: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  }

  let toastTimer;
  function showToast(msg, type = 'success') {
    const toast = document.getElementById('toast');
    toast.className = `toast ${type}`;
    document.getElementById('toastMsg').textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 4000);
  }
</script>
</body>
</html>
