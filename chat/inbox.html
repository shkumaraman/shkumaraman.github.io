---
layout: default
title: "Your Messages - Chat With Strangers"
description: "View your chat history and messages with friends."
---

<style>
:root {
  --accent: #ff6b4a;
  --accent-hover: #ff5535;
  --dark-bg: #0d0d0f;
  --dark-surface: #111114;
  --dark-border: rgba(255,255,255,0.06);
  --dark-border2: rgba(255,255,255,0.08);
  --dark-text: #fff;
  --dark-text-muted: rgba(255,255,255,0.4);
  --light-bg: #f0f0f2;
  --light-surface: #ffffff;
  --light-border: rgba(0,0,0,0.07);
  --light-border2: rgba(0,0,0,0.1);
  --light-text: #111;
  --light-text-muted: rgba(0,0,0,0.4);
}

* { box-sizing: border-box; }
html, body { overflow-x: hidden; height: 100%; }

body {
  margin: 0; padding: 0;
  font-family: 'DM Sans', sans-serif;
  background: var(--dark-bg);
  color: var(--dark-text);
  display: flex;
  flex-direction: column;
  height: 100vh;
  transition: background 0.3s, color 0.3s;
}

body.light-mode { background: var(--light-bg); color: var(--light-text); }

.app-header {
  position: fixed !important;
  top: 0; left: 0; width: 100%; height: 50px;
  background: var(--dark-surface);
  padding: 8px 15px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 15px; border-bottom: 0.5px solid var(--dark-border); z-index: 10000;
}
.light-mode .app-header { background: var(--light-surface); border-bottom: 0.5px solid var(--light-border2); }

.header-left, .header-right { display: flex; align-items: center; gap: 10px; }
.logo { height: 36px; width: 36px; border-radius: 8px; }
.app-title { font-size: 15px; font-weight: 700; font-family: 'Syne', sans-serif; color: var(--dark-text); margin: 0; }
.light-mode .app-title { color: var(--light-text); }

.header-toggle {
  background: none; border: none; color: var(--dark-text-muted);
  font-size: 1.1em; cursor: pointer; width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; transition: all 0.3s;
}
.header-toggle:hover { background: rgba(255,255,255,0.1); }
.light-mode .header-toggle { color: var(--light-text-muted); }
.light-mode .header-toggle:hover { background: rgba(0,0,0,0.07); }

.container {
  padding: 60px 0 20px 0; max-width: 600px;
  margin: 0 auto; flex: 1; width: 100%;
}

.friend-list { display: flex; flex-direction: column; gap: 8px; padding: 0 12px; }

.friend-item {
  background: var(--dark-surface);
  padding: 14px; border-radius: 12px;
  display: flex; align-items: center; gap: 14px;
  cursor: pointer; border: 0.5px solid var(--dark-border);
}
.light-mode .friend-item { background: var(--light-surface); border-color: var(--light-border2); }
.friend-item:hover { background: rgba(255,255,255,0.05); }
.light-mode .friend-item:hover { background: rgba(0,0,0,0.03); }

.friend-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--accent); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; font-family: 'Syne', sans-serif;
}

.friend-info { flex: 1; min-width: 0; }
.friend-name { margin: 0 0 2px; font-size: 14px; font-weight: 700; }
.last-message { margin: 0; font-size: 12px; color: var(--dark-text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.light-mode .last-message { color: var(--light-text-muted); }

.message-time { font-size: 11px; color: var(--dark-text-muted); }
.light-mode .message-time { color: var(--light-text-muted); }

.unfriend-btn {
  background: rgba(255,77,77,0.1); border: none; color: #ff6b6b;
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
}

.chat-container {
  display: none; flex-direction: column;
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: var(--dark-bg); z-index: 10001;
}
.light-mode .chat-container { background: var(--light-bg); }

.chat-header {
  height: 50px; background: var(--dark-surface);
  display: flex; align-items: center; padding: 0 15px; gap: 12px;
  border-bottom: 0.5px solid var(--dark-border);
}
.light-mode .chat-header { background: var(--light-surface); border-bottom-color: var(--light-border2); }

.back-btn { background: none; border: none; color: var(--dark-text); font-size: 1.2em; cursor: pointer; }
.chat-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; }
.chat-name { margin: 0; font-size: 14px; font-weight: 700; color: var(--dark-text); flex: 1; }
.light-mode .chat-name { color: var(--light-text); }

#chatLog {
  flex: 1; overflow-y: auto; padding: 20px 15px; display: flex; flex-direction: column; gap: 10px;
}

.msg {
  padding: 10px 14px; border-radius: 12px; max-width: 80%; font-size: 14px; line-height: 1.4;
}
.me { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
.stranger { align-self: flex-start; background: var(--dark-surface); border-bottom-left-radius: 4px; }
.light-mode .stranger { background: #e5e5ea; color: #111; }

.chat-controls {
  padding: 8px 10px; background: var(--dark-surface); border-top: 0.5px solid var(--dark-border);
  display: flex; align-items: center; gap: 8px;
}
.light-mode .chat-controls { background: var(--light-surface); border-top-color: var(--light-border2); }

#msgInput {
  flex: 1; padding: 10px 14px; border-radius: 20px; border: 0.5px solid var(--dark-border2);
  background: var(--dark-input-bg); color: var(--dark-text); font-size: 14px; outline: none;
}
.light-mode #msgInput { background: var(--light-input-bg); border-color: var(--light-border2); color: var(--light-text); }

.send-btn { background: var(--accent); color: white; border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; }

@media (min-width: 769px) {
  .chat-container { max-width: 720px; left: 50%; transform: translateX(-50%); }
}
</style>

<header class="app-header">
  <div class="header-left">
    <button class="menu-btn header-toggle" onclick="toggleMenu()" style="border:none;">&#9776;</button>
    <img src="logo.png" alt="TalkRush Logo" class="logo">
    <h1 class="app-title" id="pageTitle">Messages</h1>
  </div>
  <div class="header-right">
    <button class="header-toggle" onclick="openPreferencesModal()" title="Edit Interest">
      <i class="fas fa-pencil-alt"></i>
    </button>
    <button class="header-toggle" id="themeToggle" title="Toggle Dark/Light Mode">
      <i class="fas fa-moon"></i>
    </button>
  </div>
</header>

<div class="container" id="friendsContainer">
  <div id="loading" class="loading">Loading...</div>
  <div id="emptyState" class="empty-state" style="display:none">No conversations yet</div>
  <div id="friendList" class="friend-list"></div>
</div>

<div class="chat-container" id="chatContainer">
  <div class="chat-header">
    <button class="back-btn" onclick="closeChat()">&larr;</button>
    <div class="chat-avatar" id="chatAvatar">?</div>
    <h3 class="chat-name" id="chatName">Friend</h3>
  </div>
  <div id="chatLog"></div>
  <div class="chat-controls">
    <input type="text" id="msgInput" placeholder="Message..." />
    <button id="sendBtn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
  </div>
</div>

{% include menu.html %}
{% include scripts.html %}

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js';
import { getDatabase, ref, onValue, get, set, remove, push, onChildAdded } from 'https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js';

const firebaseConfig = { databaseURL: "https://talkrush-76259-default-rtdb.asia-southeast1.firebasedatabase.app/" };
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentChatId = null;
let myNickname = localStorage.getItem("talkrush_nickname") || "Guest";

window.openChat = (chatId, name) => {
  currentChatId = chatId;
  document.getElementById('chatName').textContent = name;
  document.getElementById('chatAvatar').textContent = name.charAt(0).toUpperCase();
  document.getElementById('friendsContainer').style.display = 'none';
  document.getElementById('chatContainer').style.display = 'flex';
  loadMessages(chatId);
};

window.closeChat = () => {
  currentChatId = null;
  document.getElementById('friendsContainer').style.display = 'block';
  document.getElementById('chatContainer').style.display = 'none';
};

function loadMessages(chatId) {
  const log = document.getElementById('chatLog');
  log.innerHTML = '';
  onValue(ref(db, `friends/${chatId}/messages`), (snap) => {
    log.innerHTML = '';
    const msgs = snap.val();
    if(msgs) Object.values(msgs).forEach(msg => appendMsg(msg));
  });
}

function appendMsg(msg) {
  const log = document.getElementById('chatLog');
  const div = document.createElement('div');
  div.className = `msg ${msg.nickname === myNickname ? 'me' : 'stranger'}`;
  div.textContent = msg.text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

document.getElementById('sendBtn').onclick = () => {
  const input = document.getElementById('msgInput');
  if(!input.value.trim() || !currentChatId) return;
  push(ref(db, `friends/${currentChatId}/messages`), {
    nickname: myNickname,
    text: input.value.trim(),
    timestamp: Date.now(),
    type: 'text'
  });
  input.value = '';
};

onValue(ref(db, "friends"), (snap) => {
  const list = document.getElementById("friendList");
  const data = snap.val();
  if(!data) return;
  list.innerHTML = "";
  Object.entries(data).forEach(([id, f]) => {
    const name = f.nickname2 === myNickname ? f.nickname1 : f.nickname2;
    const div = document.createElement("div");
    div.className = "friend-item";
    div.innerHTML = `<div class="friend-avatar">${name.charAt(0).toUpperCase()}</div><div class="friend-info"><p class="friend-name">${name}</p></div>`;
    div.onclick = () => openChat(id, name);
    list.appendChild(div);
  });
  document.getElementById("loading").style.display = "none";
});

document.getElementById('themeToggle').addEventListener('click', () => {
  document.body.classList.toggle('light-mode');
  const icon = document.querySelector('#themeToggle i');
  icon.classList.toggle('fa-moon');
  icon.classList.toggle('fa-sun');
});
</script>
