<style>
.custom-call-modal {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(18, 18, 18, 0.98);
  z-index: 999999;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
}

.call-video-container {
  width: 100%; height: 100%;
  position: relative;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
}

#remoteVideo { width: 100%; height: 100%; object-fit: cover; }

#localVideo {
  width: 120px; height: 160px;
  position: absolute;
  top: 20px; left: 20px;
  border-radius: 12px;
  object-fit: cover;
  border: 2px solid rgba(255,255,255,0.2);
  background: #222;
  box-shadow: 0 5px 15px rgba(0,0,0,0.5);
  z-index: 10;
}

.active-call-controls {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 20px;
  background: rgba(0,0,0,0.6);
  padding: 15px 25px;
  border-radius: 40px;
  backdrop-filter: blur(5px);
  z-index: 10;
}

.action-btn {
  width: 60px; height: 60px;
  border-radius: 50%;
  border: none;
  font-size: 24px;
  cursor: pointer;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s;
}
.action-btn:active { transform: scale(0.9); }
.btn-reject { background: #FF3B30; box-shadow: 0 4px 15px rgba(255, 59, 48, 0.4); }

.calling-text {
  position: absolute;
  font-size: 20px;
  font-weight: 600;
  color: #fff;
  z-index: 5;
}
</style>

<div id="customCallModal" class="custom-call-modal">
  <div class="call-video-container">
    <div id="callingStatusText" class="calling-text">Calling...</div>
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay playsinline muted></video>
    
    <div class="active-call-controls">
      <button class="action-btn" id="toggleMuteBtn" style="background: rgba(255,255,255,0.2);" onclick="window.toggleAudio()">
        <i class="fas fa-microphone"></i>
      </button>
      <button class="action-btn" id="toggleVideoBtn" style="background: rgba(255,255,255,0.2);" onclick="window.toggleVideo()">
        <i class="fas fa-video"></i>
      </button>
      <button class="action-btn btn-reject" onclick="window.endCall()">
        <i class="fas fa-phone-slash"></i>
      </button>
    </div>
  </div>
</div>

<script type="module">
import { ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

document.addEventListener('DOMContentLoaded', () => {
  const globalNickname = localStorage.getItem("talkrush_nickname");
  if (!globalNickname) return;

  const myPeerId = "user_" + globalNickname.replace(/[^a-zA-Z0-9]/g, '_');
  const peer = new Peer(myPeerId);
  
  let localStream = null;
  let currentActiveCall = null;
  let isAudioMuted = false;
  let isVideoPaused = false;
  let outboundCallListener = null;
  let activeTarget = null;
  
  const callModal = document.getElementById('customCallModal');
  const localVideo = document.getElementById('localVideo');
  const remoteVideo = document.getElementById('remoteVideo');
  const callingStatusText = document.getElementById('callingStatusText');
  const toggleVideoBtn = document.getElementById('toggleVideoBtn');

  peer.on('call', (call) => {
    currentActiveCall = call;
    call.answer(localStream);
    call.on('stream', (remoteStream) => {
      callingStatusText.style.display = 'none';
      remoteVideo.srcObject = remoteStream;
    });
    call.on('close', cleanupCallUI);
    call.on('error', cleanupCallUI);
  });

  window.startOutgoingCall = async (targetNickname, callType) => {
    activeTarget = targetNickname;
    callModal.style.display = 'flex';
    callingStatusText.innerText = "Calling " + targetNickname + "...";
    callingStatusText.style.display = 'block';
    remoteVideo.srcObject = null;

    try {
      localStream = await navigator.mediaDevices.getUserMedia({
        video: callType === 'video',
        audio: true
      });
    } catch (err) {
      if (callType === 'video') {
        try {
          localStream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
          callType = 'audio';
        } catch (audioErr) {
          cleanupCallUI();
          return;
        }
      } else {
        cleanupCallUI();
        return;
      }
    }
LocalStream;
    if (callType === 'audio') {
      toggleVideoBtn.style.display = 'none';
    } else {
      toggleVideoBtn.style.display = 'flex';
    }

    localVideo.srcObject = localStream;
    localVideo.style.display = callType === 'video' ? 'block' : 'none';

    const targetCallRef = ref(window.firebaseDB, `calls/${targetNickname}`);
    await set(targetCallRef, {
      caller: globalNickname,
      callerPeerId: myPeerId,
      receiver: targetNickname,
      type: callType,
      status: 'calling',
      timestamp: Date.now()
    });

    if (outboundCallListener) outboundCallListener();
    outboundCallListener = onValue(targetCallRef, (snap) => {
      const data = snap.val();
      if (!data) return;

      if (data.status === 'accepted') {
        callingStatusText.innerText = "Connecting media...";
        const targetPeerId = data.receiverPeerId || ("user_" + targetNickname.replace(/[^a-zA-Z0-9]/g, '_'));
        const call = peer.call(targetPeerId, localStream);
        currentActiveCall = call;
        
        call.on('stream', (remoteStream) => {
          callingStatusText.style.display = 'none';
          remoteVideo.srcObject = remoteStream;
        });
        call.on('close', cleanupCallUI);
        call.on('error', cleanupCallUI);

        if (outboundCallListener) { outboundCallListener(); outboundCallListener = null; }

      } else if (data.status === 'rejected' || data.status === 'ended') {
        cleanupCallUI();
      }
    });
  };

  window.acceptIncomingCall = async (callerNickname, callType) => {
    activeTarget = callerNickname;
    try {
      localStream = await navigator.mediaDevices.getUserMedia({
        video: callType === 'video',
        audio: true
      });
      
      if (callType === 'audio') {
        toggleVideoBtn.style.display = 'none';
      } else {
        toggleVideoBtn.style.display = 'flex';
      }

      localVideo.srcObject = localStream;
      localVideo.style.display = callType === 'video' ? 'block' : 'none';
      remoteVideo.srcObject = null;
      callingStatusText.innerText = "Connecting...";
      callingStatusText.style.display = 'block';
      callModal.style.display = 'flex';
    } catch (err) {
      set(ref(window.firebaseDB, `calls/${globalNickname}/status`), 'rejected');
    }
  };

  window.forceEndCallUI = () => {
     if (callModal.style.display === 'flex') {
        cleanupCallUI();
     }
  };

  window.endCall = () => {
    if (activeTarget) {
       remove(ref(window.firebaseDB, `calls/${activeTarget}`));
    }
    remove(ref(window.firebaseDB, `calls/${globalNickname}`));
    
    if (currentActiveCall) {
       currentActiveCall.close();
    }
    cleanupCallUI();
  };

  window.toggleAudio = () => {
    if (!localStream) return;
    isAudioMuted = !isAudioMuted;
    localStream.getAudioTracks()[0].enabled = !isAudioMuted;
    const btn = document.getElementById('toggleMuteBtn');
    btn.innerHTML = isAudioMuted ? '<i class="fas fa-microphone-slash"></i>' : '<i class="fas fa-microphone"></i>';
    btn.style.color = isAudioMuted ? '#FF3B30' : 'white';
  };

  window.toggleVideo = () => {
    if (!localStream || !localStream.getVideoTracks()[0]) return;
    isVideoPaused = !isVideoPaused;
    localStream.getVideoTracks()[0].enabled = !isVideoPaused;
    const btn = document.getElementById('toggleVideoBtn');
    btn.innerHTML = isVideoPaused ? '<i class="fas fa-video-slash"></i>' : '<i class="fas fa-video"></i>';
    btn.style.color = isVideoPaused ? '#FF3B30' : 'white';
  };

  function cleanupCallUI() {
    if (activeTarget) {
       remove(ref(window.firebaseDB, `calls/${activeTarget}`));
    }
    remove(ref(window.firebaseDB, `calls/${globalNickname}`));

    callModal.style.display = 'none';
    if (localStream) localStream.getTracks().forEach(track => track.stop());
    localVideo.srcObject = null;
    remoteVideo.srcObject = null;
    currentActiveCall = null;
    activeTarget = null;
    isAudioMuted = false;
    isVideoPaused = false;
    if (outboundCallListener) { outboundCallListener(); outboundCallListener = null; }
    
    document.getElementById('toggleMuteBtn').innerHTML = '<i class="fas fa-microphone"></i>';
    document.getElementById('toggleMuteBtn').style.color = 'white';
    document.getElementById('toggleVideoBtn').innerHTML = '<i class="fas fa-video"></i>';
    document.getElementById('toggleVideoBtn').style.color = 'white';
    toggleVideoBtn.style.display = 'flex';
  }
});
</script>
