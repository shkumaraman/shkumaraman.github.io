<style>
  .custom-call-modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(18, 18, 18, 0.98);
    z-index: 999999;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
  }

  .call-video-container {
    width: 100%;
    height: 100%;
    position: relative;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #remoteVideo {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  #localVideo {
    width: 120px;
    height: 160px;
    position: absolute;
    top: 20px;
    left: 20px;
    border-radius: 12px;
    object-fit: cover;
    border: 2px solid rgba(255, 255, 255, 0.2);
    background: #222;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
    z-index: 10;
  }

  .active-call-controls {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 20px;
    background: rgba(0, 0, 0, 0.6);
    padding: 15px 25px;
    border-radius: 40px;
    backdrop-filter: blur(5px);
    z-index: 10;
  }

  .action-btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: none;
    font-size: 24px;
    cursor: pointer;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s;
  }

  .action-btn:active {
    transform: scale(0.9);
  }

  .btn-reject {
    background: #FF3B30;
    box-shadow: 0 4px 15px rgba(255, 59, 48, 0.4);
  }

  .calling-text {
    position: absolute;
    font-size: 20px;
    font-weight: 600;
    color: #fff;
    z-index: 5;
  }
</style>

<div id="customCallModal" class="custom-call-modal">
  <div class="call-video-container">
    <div id="callingStatusText" class="calling-text">Calling...</div>
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay playsinline muted></video>

    <div class="active-call-controls">
      <button class="action-btn" id="toggleMuteBtn" style="background: rgba(255,255,255,0.2);"
        onclick="window.toggleAudio()">
        <i class="fas fa-microphone"></i>
      </button>
      <button class="action-btn" id="toggleVideoBtn" style="background: rgba(255,255,255,0.2);"
        onclick="window.toggleVideo()">
        <i class="fas fa-video"></i>
      </button>
      <button class="action-btn btn-reject" onclick="window.endCall()">
        <i class="fas fa-phone-slash"></i>
      </button>
    </div>
  </div>
</div>

<script type="module">
  import { ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

  document.addEventListener('DOMContentLoaded', () => {
    const globalNickname = localStorage.getItem("talkrush_nickname");
    if (!globalNickname) return;

    const peer = new Peer(undefined, {
      config: {
        iceServers: [
          { urls: 'stun:stun.l.google.com:19302' },
          { urls: 'stun:stun1.l.google.com:19302' },
          { urls: 'stun:stun2.l.google.com:19302' },
          { urls: 'stun:stun3.l.google.com:19302' },
          { urls: 'stun:stun4.l.google.com:19302' }
        ]
      }
    });
    window.myCallPeer = peer;

    let localStream = null;
    let currentActiveCall = null;
    let isAudioMuted = false;
    let isVideoPaused = false;
    let outboundCallListener = null;
    let inboundCallListener = null;
    let activeTarget = null;

    peer.on('call', (call) => {
      currentActiveCall = call;
      if (localStream) {
        call.answer(localStream);
      } else {
        call.answer();
      }
      call.on('stream', (remoteStream) => {
        const text = document.getElementById('callingStatusText');
        const rVideo = document.getElementById('remoteVideo');
        if (text) text.style.display = 'none';
        if (rVideo) rVideo.srcObject = remoteStream;
      });
      call.on('close', cleanupCallUI);
      call.on('error', cleanupCallUI);
    });

    window.startOutgoingCall = async (targetNickname, callType) => {
      activeTarget = targetNickname;
      
      const modal = document.getElementById('customCallModal');
      const text = document.getElementById('callingStatusText');
      const rVideo = document.getElementById('remoteVideo');
      
      if (modal) modal.style.display = 'flex';
      if (text) {
        text.innerText = "Calling " + targetNickname + "...";
        text.style.display = 'block';
      }
      if (rVideo) rVideo.srcObject = null;

      try {
        localStream = await navigator.mediaDevices.getUserMedia({
          video: callType === 'video',
          audio: true
        });
      } catch (err) {
        if (callType === 'video') {
          try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
            callType = 'audio';
          } catch (audioErr) {
            cleanupCallUI();
            return;
          }
        } else {
          cleanupCallUI();
          return;
        }
      }

      const vBtn = document.getElementById('toggleVideoBtn');
      if (vBtn) vBtn.style.display = callType === 'audio' ? 'none' : 'flex';

      const lVideo = document.getElementById('localVideo');
      if (lVideo) {
        lVideo.srcObject = localStream;
        lVideo.style.display = callType === 'video' ? 'block' : 'none';
      }

      const getPeerId = () => {
        return new Promise((resolve) => {
          if (peer && peer.id) {
            resolve(peer.id);
          } else if (peer) {
            peer.on('open', (id) => {
              resolve(id);
            });
            setTimeout(() => resolve(null), 3000);
          } else {
            resolve(null);
          }
        });
      };
      
      const currentPeerId = await getPeerId() || ("user_" + globalNickname.replace(/[^a-zA-Z0-9]/g, '_'));
      const targetCallRef = ref(window.firebaseDB, `calls/${targetNickname}`);
      
      await set(targetCallRef, {
        caller: globalNickname,
        callerPeerId: currentPeerId,
        receiver: targetNickname,
        type: callType,
        status: 'calling',
        timestamp: Date.now()
      });

      if (outboundCallListener) outboundCallListener();
      outboundCallListener = onValue(targetCallRef, (snap) => {
        const data = snap.val();
        
        if (!data) {
          cleanupCallUI();
          return;
        }

        if (data.status === 'accepted') {
          const stText = document.getElementById('callingStatusText');
          if (stText) stText.innerText = "Connecting media...";

          if (data.type === 'audio' && callType === 'video') {
            callType = 'audio';
            const vButton = document.getElementById('toggleVideoBtn');
            const localVid = document.getElementById('localVideo');
            if (vButton) vButton.style.display = 'none';
            if (localVid) localVid.style.display = 'none';
          }

          const targetPeerId = data.receiverPeerId || ("user_" + targetNickname.replace(/[^a-zA-Z0-9]/g, '_'));
          const call = peer.call(targetPeerId, localStream);
          currentActiveCall = call;

          call.on('stream', (remoteStream) => {
            const stxt = document.getElementById('callingStatusText');
            const rVid = document.getElementById('remoteVideo');
            if (stxt) stxt.style.display = 'none';
            if (rVid) rVid.srcObject = remoteStream;
          });
          
          call.on('close', cleanupCallUI);
          call.on('error', cleanupCallUI);

        } else if (data.status === 'rejected' || data.status === 'ended') {
          cleanupCallUI();
        }
      });
    };

    window.acceptIncomingCall = async (callerNickname, callType) => {
      activeTarget = callerNickname;
      const myCallRef = ref(window.firebaseDB, `calls/${globalNickname}`);

      try {
        localStream = await navigator.mediaDevices.getUserMedia({
          video: callType === 'video',
          audio: true
        });
      } catch (err) {
        if (callType === 'video') {
          try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
            callType = 'audio';
          } catch (audioErr) {
            update(myCallRef, { status: 'rejected' });
            return false;
          }
        } else {
          update(myCallRef, { status: 'rejected' });
          return false;
        }
      }

      const vBtn = document.getElementById('toggleVideoBtn');
      if (vBtn) vBtn.style.display = callType === 'audio' ? 'none' : 'flex';

      const lVideo = document.getElementById('localVideo');
      if (lVideo) {
        lVideo.srcObject = localStream;
        lVideo.style.display = callType === 'video' ? 'block' : 'none';
      }

      const rVideo = document.getElementById('remoteVideo');
      if (rVideo) rVideo.srcObject = null;

      const text = document.getElementById('callingStatusText');
      if (text) {
        text.innerText = "Connecting...";
        text.style.display = 'block';
      }

      const modal = document.getElementById('customCallModal');
      if (modal) modal.style.display = 'flex';

      const currentPeerId = peer.id || ("user_" + globalNickname.replace(/[^a-zA-Z0-9]/g, '_'));
      update(myCallRef, {
        status: 'accepted',
        receiverPeerId: currentPeerId,
        type: callType
      });

      if (inboundCallListener) inboundCallListener();
      inboundCallListener = onValue(myCallRef, (snap) => {
        const data = snap.val();
        if (!data || data.status === 'ended') {
          cleanupCallUI();
        }
      });

      return true;
    };

    window.forceEndCallUI = () => {
      const modal = document.getElementById('customCallModal');
      if (modal && modal.style.display === 'flex') {
        cleanupCallUI();
      }
    };

    window.endCall = () => {
      cleanupCallUI();
    };

    window.toggleAudio = () => {
      if (!localStream || !localStream.getAudioTracks()[0]) return;
      isAudioMuted = !isAudioMuted;
      localStream.getAudioTracks()[0].enabled = !isAudioMuted;
      const btn = document.getElementById('toggleMuteBtn');
      if (btn) {
        btn.innerHTML = isAudioMuted ? '<i class="fas fa-microphone-slash"></i>' : '<i class="fas fa-microphone"></i>';
        btn.style.color = isAudioMuted ? '#FF3B30' : 'white';
      }
    };

    window.toggleVideo = () => {
      if (!localStream || !localStream.getVideoTracks()[0]) return;
      isVideoPaused = !isVideoPaused;
      localStream.getVideoTracks()[0].enabled = !isVideoPaused;
      const btn = document.getElementById('toggleVideoBtn');
      if (btn) {
        btn.innerHTML = isVideoPaused ? '<i class="fas fa-video-slash"></i>' : '<i class="fas fa-video"></i>';
        btn.style.color = isVideoPaused ? '#FF3B30' : 'white';
      }
    };

    function cleanupCallUI() {
      try {
        if (activeTarget) remove(ref(window.firebaseDB, `calls/${activeTarget}`));
        if (globalNickname) remove(ref(window.firebaseDB, `calls/${globalNickname}`));
      } catch (e) { console.warn(e); }

      try {
        if (currentActiveCall) {
          currentActiveCall.close();
          currentActiveCall = null;
        }
      } catch (e) { console.warn(e); }

      try {
        if (localStream) {
          localStream.getTracks().forEach(track => track.stop());
          localStream = null;
        }
      } catch (e) { console.warn(e); }

      try {
        const modal = document.getElementById('customCallModal');
        if (modal) modal.style.display = 'none';

        const lVideo = document.getElementById('localVideo');
        if (lVideo) lVideo.srcObject = null;

        const rVideo = document.getElementById('remoteVideo');
        if (rVideo) rVideo.srcObject = null;

        const text = document.getElementById('callingStatusText');
        if (text) text.style.display = 'none';

        const mBtn = document.getElementById('toggleMuteBtn');
        if (mBtn) {
          mBtn.innerHTML = '<i class="fas fa-microphone"></i>';
          mBtn.style.color = 'white';
        }

        const vBtn = document.getElementById('toggleVideoBtn');
        if (vBtn) {
          vBtn.innerHTML = '<i class="fas fa-video"></i>';
          vBtn.style.color = 'white';
          vBtn.style.display = 'flex';
        }
      } catch (e) { console.warn(e); }

      activeTarget = null;
      isAudioMuted = false;
      isVideoPaused = false;

      if (outboundCallListener) { 
        outboundCallListener(); 
        outboundCallListener = null; 
      }
      if (inboundCallListener) {
        inboundCallListener();
        inboundCallListener = null;
      }
    }
  });
</script>
