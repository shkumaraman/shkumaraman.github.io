<script>
function toggleMenu() {
  const menu = document.getElementById("menu");
  const overlay = document.querySelector('.menu-overlay');
  const menuBtns = document.querySelectorAll('.menu-btn');
  const isOpen = menu.style.left === "0px";

  menu.style.left = isOpen ? "-270px" : "0px";
  if (overlay) overlay.style.display = isOpen ? "none" : "block";
  menuBtns.forEach(btn => btn.innerHTML = isOpen ? "&#9776;" : "&#10006;");
}

document.addEventListener('DOMContentLoaded', function () {
  // Overlay
  if (!document.querySelector('.menu-overlay')) {
    const overlay = document.createElement('div');
    overlay.className = 'menu-overlay';
    overlay.onclick = toggleMenu;
    document.body.appendChild(overlay);
  }

  // Mark active link
  const currentPath = window.location.pathname;
  document.querySelectorAll('.menu-items a').forEach(link => {
    if (link.getAttribute('href') === currentPath) {
      link.classList.add('active');
    }
  });

  // Share button
  const shareButton = document.getElementById("shareButton");
  shareButton.addEventListener("click", async () => {
    const shareData = {
      title: "TalkRush - Chat With Strangers!",
      text: "Connect with strangers, chat and talk freely, and explore fun conversations. Try TalkRush now:",
      url: "https://shkumaraman.github.io"
    };

    if (navigator.share) {
      try { await navigator.share(shareData); } catch (err) {}
    } else {
      const fullText = shareData.text + " " + shareData.url;
      if (navigator.clipboard) {
        navigator.clipboard.writeText(fullText);
      } else {
        const tmp = document.createElement("input");
        tmp.value = fullText;
        document.body.appendChild(tmp);
        tmp.select();
        document.execCommand("copy");
        document.body.removeChild(tmp);
      }
    }
  });
});
</script>
