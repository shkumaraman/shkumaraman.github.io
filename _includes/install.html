<div id="sneaker-bar">
  <span class="sb-text">Enjoying the app? Add it to your home screen!</span>
  <div class="sb-btns">
    <button id="sb-installed">Dismiss</button>
    <button id="sb-install">Install</button>
  </div>
</div>

<style>
#sneaker-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #111111;
  color: #ffffff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 12px 16px;
  z-index: 99999;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  border-top: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow: 0 -6px 28px rgba(0, 0, 0, 0.5);
  transform: translateY(110%);
  transition: transform 0.42s cubic-bezier(0.34, 1.4, 0.64, 1);
}
#sneaker-bar.sb-show { transform: translateY(0); }
.sb-text {
  font-size: 13px;
  font-weight: 500;
  line-height: 1.4;
  flex: 1;
  min-width: 0;
}
.sb-btns {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-shrink: 0;
}
#sb-installed {
  background: #111111;
  color: #ffffff;
  border: 1px solid rgba(255, 255, 255, 0.55);
  padding: 7px 12px;
  border-radius: 7px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
}
#sb-install {
  background: #ffffff;
  color: #111111;
  border: none;
  padding: 7px 14px;
  border-radius: 7px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
}
</style>

<script>
(function () {
  var KEY_PERM = 'pwa_installed';
  var KEY_TEMP = 'pwa_snoozed';
  var DELAY_MS = 3000;
  var HOURS_24 = 24 * 60 * 60 * 1000;

  var bar        = document.getElementById('sneaker-bar');
  var btnDone    = document.getElementById('sb-installed');
  var btnInstall = document.getElementById('sb-install');
  var prompt     = null;

  if (localStorage.getItem(KEY_PERM)) return;

  var snoozedAt = localStorage.getItem(KEY_TEMP);
  if (snoozedAt && (Date.now() - parseInt(snoozedAt, 10)) < HOURS_24) return;

  window.addEventListener('beforeinstallprompt', function (e) {
    e.preventDefault();
    prompt = e;
  });

  setTimeout(function () {
    if (!localStorage.getItem(KEY_PERM)) bar.classList.add('sb-show');
  }, DELAY_MS);

  btnDone.addEventListener('click', function () { snoozeDismiss(); });

  btnInstall.addEventListener('click', function () {
    if (prompt) {
      prompt.prompt();
      prompt.userChoice.then(function (result) {
        prompt = null;
        if (result.outcome === 'accepted') permanentDismiss();
        else snoozeDismiss();
      });
    } else {
      alert('Go to browser menu and tap "Add to Home Screen".');
      snoozeDismiss();
    }
  });

  window.addEventListener('appinstalled', function () { permanentDismiss(); });

  function hideBar() {
    bar.style.transform = 'translateY(110%)';
    setTimeout(function () { bar.style.display = 'none'; }, 450);
  }
  function permanentDismiss() {
    hideBar();
    localStorage.setItem(KEY_PERM, '1');
    localStorage.removeItem(KEY_TEMP);
  }
  function snoozeDismiss() {
    hideBar();
    localStorage.setItem(KEY_TEMP, Date.now().toString());
  }
})();
</script>
