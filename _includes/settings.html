<!-- ===================== SCRIPT ===================== -->
<script>
(function() {
  /* ─── State ─── */
  let pmTags = [];
  let pmGender = 'everyone';
  let pmIsLight = false;
  let pmBannedWords = [];
  let pmBannedLoaded = false;

  /* Drag state */
  let pmTouchStartY = 0, pmTouchCurrentY = 0, pmDragging = false;

  /* ─── Init ─── */
  document.addEventListener('DOMContentLoaded', function() {
    pmLoadBannedWords();
    pmCheckNickname();
    pmLoadSavedPrefs();
    pmApplyThemeFromStorage();

    const overlay = document.getElementById('preferencesModal');
    if (overlay) overlay.addEventListener('click', pmOutsideClick);

    const handle = document.getElementById('pmHandle');
    if (handle) {
      handle.addEventListener('touchstart', pmTouchStart, { passive: false });
      handle.addEventListener('touchmove', pmTouchMove, { passive: false });
      handle.addEventListener('touchend', pmTouchEnd);
      handle.addEventListener('mousedown', pmMouseDown);
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') pmCloseModal();
    });
  });

  /* ─── Banned words ─── */
  async function pmLoadBannedWords() {
    try {
      const r = await fetch('filter.txt');
      const t = await r.text();
      pmBannedWords = t.split('\n').map(w => w.trim().toLowerCase()).filter(w => w.length > 1);
      pmBannedLoaded = true;
    } catch(e) { pmBannedLoaded = true; }
  }

  function pmHasBannedWord(text) {
    if (!pmBannedLoaded || !text) return false;
    return pmBannedWords.some(w => {
      const esc = w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return new RegExp('\\b' + esc + '\\b', 'i').test(text);
    });
  }

  /* ─── Open / Close ─── */
  window.pmOpenModal = function() {
    const overlay = document.getElementById('preferencesModal');
    overlay.style.display = 'flex';
    overlay.offsetHeight;
    overlay.classList.add('pm-show');
    pmLoadSavedPrefs();
  };

  window.pmCloseModal = function() {
    if (!pmHasNickname()) { pmHighlightNickname(); return; }
    const overlay = document.getElementById('preferencesModal');
    overlay.classList.remove('pm-show');
    setTimeout(() => overlay.style.display = 'none', 350);
  };

  function pmOutsideClick(e) {
    if (e.target === document.getElementById('preferencesModal')) pmCloseModal();
  }

  function pmHasNickname() {
    return !!localStorage.getItem('talkrush_nickname');
  }

  function pmHighlightNickname() {
    const inp = document.getElementById('pmNicknameInput');
    inp.classList.add('pm-error-field');
    setTimeout(() => inp.classList.remove('pm-error-field'), 1500);
    pmShowFeedback('Please enter a nickname', true);
  }

  /* ─── Load saved prefs ─── */
  function pmLoadSavedPrefs() {
    const nick = localStorage.getItem('talkrush_nickname');
    if (nick) {
      const inp = document.getElementById('pmNicknameInput');
      inp.value = nick.replace(/^TR\|/, '');
      pmUpdateCharCount(inp);
    }
    const gender = localStorage.getItem('talkrush_gender_interest');
    if (gender) {
      pmGender = gender;
      document.querySelectorAll('.pm-gender-btn').forEach(b => {
        if (b.dataset.val === gender) b.classList.add('pm-active');
        else b.classList.remove('pm-active');
      });
    }
    const tagsRaw = localStorage.getItem('talkrush_tags');
    if (tagsRaw) { pmTags = JSON.parse(tagsRaw); pmRenderTags(); }

    const notifOff = localStorage.getItem('notificationOff') === 'true';
    const soundMuted = localStorage.getItem('soundMuted') === 'true' || notifOff;
    document.getElementById('pmNotifToggle').checked = !notifOff;
    document.getElementById('pmSoundToggle').checked = !soundMuted;
  }

  /* ─── Nickname ─── */
  window.pmUpdateCharCount = function(inp) {
    document.getElementById('pmCharCount').textContent = inp.value.length + '/20';
  };

  /* ─── Gender ─── */
  window.pmSelectGender = function(el) {
    document.querySelectorAll('.pm-gender-btn').forEach(b => b.classList.remove('pm-active'));
    el.classList.add('pm-active');
    pmGender = el.dataset.val;
  };

  /* ─── Tags ─── */
  window.pmHandleTag = function(e) {
    if (e.key !== 'Enter') return;
    e.preventDefault();
    const inp = document.getElementById('pmTagInput');
    const val = inp.value.trim();
    if (!val || pmTags.includes(val) || pmTags.length >= 5) return;
    pmTags.push(val);
    inp.value = '';
    pmRenderTags();
  };

  window.pmRemoveTag = function(i) {
    pmTags.splice(i, 1);
    pmRenderTags();
  };

  function pmRenderTags() {
    const box = document.getElementById('pmTagsBox');
    const inp = document.getElementById('pmTagInput');
    box.innerHTML = '';
    pmTags.forEach((t, i) => {
      const chip = document.createElement('div');
      chip.className = 'pm-tag-chip';
      chip.innerHTML = t + '<span class="pm-tag-x" onclick="pmRemoveTag(' + i + ')">×</span>';
      box.appendChild(chip);
    });
    box.appendChild(inp);
  }

  /* ─── Toggles ─── */
  window.pmHandleNotif = function(cb) {
    localStorage.setItem('notificationOff', (!cb.checked).toString());
    if (!cb.checked) {
      document.getElementById('pmSoundToggle').checked = false;
      localStorage.setItem('soundMuted', 'true');
    }
  };

  window.pmHandleSound = function(cb) {
    localStorage.setItem('soundMuted', (!cb.checked).toString());
  };

  /* ─── Theme ─── */
  window.pmToggleTheme = function() {
    pmIsLight = !pmIsLight;
    document.body.classList.toggle('pm-light', pmIsLight);
    localStorage.setItem('pm_theme', pmIsLight ? 'light' : 'dark');
    const icon = document.getElementById('pmThemeIcon');
    if (pmIsLight) {
      icon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
    } else {
      icon.innerHTML = '<path d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z"/>';
    }
  };

  function pmApplyThemeFromStorage() {
    const stored = localStorage.getItem('pm_theme');
    if (stored === 'light') { pmIsLight = true; document.body.classList.add('pm-light'); }
  }

  /* ─── Check nickname on load ─── */
  function pmCheckNickname() {
    const saved = localStorage.getItem('talkrush_nickname');
    if (!saved) setTimeout(() => window.pmOpenModal(), 500);
  }

  /* ─── Feedback ─── */
  function pmShowFeedback(msg, isError) {
    const el = document.getElementById('pmFeedback');
    el.textContent = msg;
    el.className = 'pm-feedback ' + (isError ? 'pm-fb-error' : 'pm-fb-success');
    clearTimeout(el._timer);
    el._timer = setTimeout(() => { el.className = 'pm-feedback'; }, 2500);
  }

  /* ─── Save ─── */
  window.pmSavePreferences = function() {
    const inp = document.getElementById('pmNicknameInput');
    const nick = inp.value.trim();

    if (!nick) { pmHighlightNickname(); return; }
    if (pmHasBannedWord(nick)) {
      pmShowFeedback('Nickname contains inappropriate content', true);
      return;
    }

    const stored = 'TR|' + nick.substring(0, 20);
    localStorage.setItem('talkrush_nickname', stored);
    localStorage.setItem('talkrush_gender_interest', pmGender);
    localStorage.setItem('talkrush_tags', JSON.stringify(pmTags));

    const el = document.getElementById('currentNickname');
    if (el) el.textContent = nick;

    window.dispatchEvent(new CustomEvent('nicknameUpdated', { detail: { nickname: stored } }));
    pmShowFeedback('Preferences saved ✓', false);
    setTimeout(() => window.pmCloseModal(), 1400);
  };

  /* ─── Drag to dismiss ─── */
  function pmTouchStart(e) {
    e.preventDefault();
    pmTouchStartY = e.touches[0].clientY;
    pmDragging = true;
    document.getElementById('pmSheet').style.transition = 'none';
  }
  function pmTouchMove(e) {
    if (!pmDragging) return;
    e.preventDefault();
    pmTouchCurrentY = e.touches[0].clientY;
    const d = pmTouchCurrentY - pmTouchStartY;
    if (d > 0) document.getElementById('pmSheet').style.transform = 'translateY(' + d + 'px)';
  }
  function pmTouchEnd(e) {
    if (!pmDragging) return;
    e.preventDefault();
    const sheet = document.getElementById('pmSheet');
    sheet.style.transition = 'transform 0.35s cubic-bezier(0.32,0.72,0,1)';
    const d = pmTouchCurrentY - pmTouchStartY;
    if (!pmHasNickname()) {
      sheet.style.transform = '';
      pmHighlightNickname();
    } else if (d > 100 || d > sheet.offsetHeight * 0.3) {
      window.pmCloseModal();
    } else {
      sheet.style.transform = '';
    }
    pmDragging = false;
  }
  function pmMouseDown(e) {
    e.preventDefault();
    pmTouchStartY = e.clientY;
    pmDragging = true;
    document.getElementById('pmSheet').style.transition = 'none';
    document.addEventListener('mousemove', pmMouseMove);
    document.addEventListener('mouseup', pmMouseUp);
  }
  function pmMouseMove(e) {
    if (!pmDragging) return;
    pmTouchCurrentY = e.clientY;
    const d = pmTouchCurrentY - pmTouchStartY;
    if (d > 0) document.getElementById('pmSheet').style.transform = 'translateY(' + d + 'px)';
  }
  function pmMouseUp(e) {
    if (!pmDragging) return;
    const sheet = document.getElementById('pmSheet');
    sheet.style.transition = 'transform 0.35s cubic-bezier(0.32,0.72,0,1)';
    const d = pmTouchCurrentY - pmTouchStartY;
    if (!pmHasNickname()) {
      sheet.style.transform = '';
      pmHighlightNickname();
    } else if (d > 100 || d > sheet.offsetHeight * 0.3) {
      window.pmCloseModal();
    } else {
      sheet.style.transform = '';
    }
    pmDragging = false;
    document.removeEventListener('mousemove', pmMouseMove);
    document.removeEventListener('mouseup', pmMouseUp);
  }

})();
</script>
