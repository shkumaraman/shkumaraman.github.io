<!-- Service Worker -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('{{ "/service-worker.js" | relative_url }}')
    .then(() => console.log('Service Worker registered'))
    .catch(err => console.log('Service Worker failed:', err));
}
</script>

<script>
(function(){
  // Disable text selection and copy
  document.addEventListener('selectstart', function(e){
    e.preventDefault();
  });
  document.addEventListener('copy', function(e){
    e.preventDefault();
    alert("Copying content is disabled!");
  });

  // Disable right-click on entire document
  document.addEventListener('contextmenu', function(e){
    e.preventDefault();
    alert("Right-click is disabled!");
  });

  // Disable long-press on mobile (touch hold)
  document.addEventListener('touchstart', function(e){
    if(e.touches.length === 1){
      e.preventDefault();
    }
  }, {passive:false});

  // Disable image drag/save
  const images = document.getElementsByTagName('img');
  for(let i=0; i<images.length; i++){
    images[i].ondragstart = function(e){ e.preventDefault(); };
    images[i].onmousedown = function(e){ e.preventDefault(); };
    images[i].oncontextmenu = function(e){ e.preventDefault(); };
  }
})();
</script>
