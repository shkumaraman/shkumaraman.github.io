<!-- Service Worker -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('{{ "/service-worker.js" | relative_url }}')
    .then(() => console.log('Service Worker registered'))
    .catch(err => console.log('Service Worker failed:', err));
}
</script>

<!-- Right Click Disable-->
<script>
document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
});
</script>

<!-- PeerJS -->
<script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap/dist/js/bootstrap.bundle.min.js"></script> 

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2/dist/sweetalert2.all.min.js"></script>

<script>
(function() {
    const chatContainer = document.querySelector('.chat-container');
    let maxVh = window.innerHeight;
    let currentWidth = window.innerWidth;

    if (window.visualViewport) {
        maxVh = window.visualViewport.height;
        
        window.visualViewport.addEventListener('resize', function() {
            if (window.innerWidth !== currentWidth) {
                currentWidth = window.innerWidth;
                maxVh = window.visualViewport.height;
            }

            if (window.visualViewport.height > maxVh) {
                maxVh = window.visualViewport.height;
            }

            const isKeyboardOpen = window.visualViewport.height < (maxVh - 150);

            if (isKeyboardOpen) {
                document.documentElement.style.overflow = 'hidden';
                document.body.style.overflow = 'hidden';
                if (chatContainer) chatContainer.style.height = window.visualViewport.height + 'px';
                window.scrollTo(0, 0);
            } else {
                document.documentElement.style.overflow = '';
                document.body.style.overflow = '';
                if (chatContainer) chatContainer.style.height = '';
            }
            
            const chatLog = document.getElementById("chatLog");
            if (chatLog) {
                chatLog.scrollTop = chatLog.scrollHeight;
            }
        });
    }

    document.addEventListener('focusin', function(e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
            setTimeout(function() { window.scrollTo(0, 0); }, 50);
        }
    });
})();
</script>
