<!-- Service Worker -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('{{ "/service-worker.js" | relative_url }}')
    .then(() => console.log('Service Worker registered'))
    .catch(err => console.log('Service Worker failed:', err));
}
</script>

<script>
(function(){
  // Disable text selection / copy
  document.addEventListener('selectstart', e => e.preventDefault());
  document.addEventListener('copy', e => { e.preventDefault(); alert("Copying content is disabled!"); });

  // Disable right-click on entire document
  document.addEventListener('contextmenu', e => { e.preventDefault(); alert("Right-click is disabled!"); });

  // Disable long-press menu on images only (mobile safe)
  const images = document.getElementsByTagName('img');
  for(let i=0; i<images.length; i++){
    images[i].ondragstart = e => e.preventDefault();
    images[i].onmousedown = e => e.preventDefault();
    images[i].oncontextmenu = e => e.preventDefault();

    // Mobile long-press safe
    images[i].addEventListener('touchstart', e => {
      e.stopPropagation(); // allow scroll
    }, {passive: true});
  }
})();
</script>
