<!-- TOAST UI -->
<div id="messageToast" style="
  position: fixed;
  top: -120px;
  left: 50%;
  transform: translateX(-50%);
  background: #121212;
  color: #fff;
  padding: 14px 20px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 10000;
  transition: top 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
  width: 90%;
  max-width: 500px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
">
  <div style="display: flex; align-items: center; gap: 14px; flex: 1;">
    <div id="toastIconWrapper" style="
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #25D366;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    ">
      <svg id="toastIcon" style="width: 18px; height: 18px; fill: white;" viewBox="0 0 24 24">
        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
      </svg>
    </div>
    <div style="display: flex; flex-direction: column;">
      <span id="toastName" style="
        font-size: 14px;
        font-weight: 600;
        color: #ffffff;
      "></span>
      <span id="toastMessage" style="
        font-size: 13px;
        color: #cccccc;
        margin-top: 2px;
        line-height: 1.3;
      "></span>
    </div>
  </div>
  <button id="toastViewBtn" style="
    background: #25D366;
    border: none;
    color: #fff;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    flex-shrink: 0;
  ">View</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

document.addEventListener("DOMContentLoaded", function () {
  const firebaseConfig = {
    databaseURL: "https://talkrush-76259-default-rtdb.asia-southeast1.firebasedatabase.app/"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const myNickname = localStorage.getItem("talkrush_nickname");
  if (!myNickname) return;

  const toast = document.getElementById("messageToast");
  const toastName = document.getElementById("toastName");
  const toastMessage = document.getElementById("toastMessage");
  const toastViewBtn = document.getElementById("toastViewBtn");
  const toastIcon = document.getElementById("toastIcon");
  const toastIconWrapper = document.getElementById("toastIconWrapper");

  if (!toast) return;

  const notifySound = new Audio("/assets/notify.mp3");
  notifySound.preload = "auto";

  let soundMuted = localStorage.getItem("soundMuted") === "true";
  let notificationOff = localStorage.getItem("notificationOff") === "true";

  notifySound.muted = soundMuted;

  let lastNotifiedMessages = JSON.parse(
    localStorage.getItem("lastNotifiedMessages") || "{}"
  );

  let toastQueue = [];
  let toastShowing = false;

  // ─── DM icon (chat bubble) ───────────────────────────────────────
  const DM_ICON_PATH = "M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z";

  // ─── Reply icon (reply arrow) ────────────────────────────────────
  const REPLY_ICON_PATH = "M10 9V5l-7 7 7 7v-4.1c5 0 8.5 1.6 11 5.1-1-5-4-10-11-11z";

  function getFriendNickname(friend) {
    if (friend.nickname1 === myNickname) return friend.nickname2;
    if (friend.nickname2 === myNickname) return friend.nickname1;
    return null;
  }

  function getLastMessageFromFriend(friend) {
    if (!friend.messages) return null;

    const messages = Object.values(friend.messages);
    if (messages.length === 0) return null;

    messages.sort((a, b) => b.timestamp - a.timestamp);
    const latestMessage = messages[0];

    if (latestMessage.nickname === myNickname) return null;

    let text = "New message";
    if (latestMessage.type === "image") text = "📷 Photo";
    else if (latestMessage.type === "gif") text = "🎯 GIF";
    else if (latestMessage.type === "text") text = latestMessage.text;

    return {
      text: text,
      timestamp: latestMessage.timestamp
    };
  }

  // ─── DM listener ────────────────────────────────────────────────
  const friendsRef = ref(db, "friends");

  onValue(friendsRef, (snapshot) => {
    const data = snapshot.val();
    if (!data) return;

    Object.entries(data).forEach(([chatId, friend]) => {
      if (
        friend.nickname1 !== myNickname &&
        friend.nickname2 !== myNickname
      ) return;

      const friendNickname = getFriendNickname(friend);
      if (!friendNickname) return;

      const lastMessage = getLastMessageFromFriend(friend);
      if (!lastMessage) return;

      const notificationKey = chatId + "_" + lastMessage.timestamp;
      if (lastNotifiedMessages[chatId] === notificationKey) return;

      toastQueue.push({
        senderName: friendNickname,
        message: lastMessage.text,
        redirectUrl: "/chat/inbox.html",
        type: "dm",
        timestamp: lastMessage.timestamp
      });

      lastNotifiedMessages[chatId] = notificationKey;
      localStorage.setItem(
        "lastNotifiedMessages",
        JSON.stringify(lastNotifiedMessages)
      );

      processToastQueue();
    });
  }, (error) => {
    console.error("Firebase listener error:", error);
  });

  // ─── Group reply listener ────────────────────────────────────────
  const groupsRef = ref(db, "groups");

  onValue(groupsRef, (snapshot) => {
    const groupsData = snapshot.val();
    if (!groupsData) return;

    Object.entries(groupsData).forEach(([groupName, groupData]) => {
      if (!groupData.messages) return;

      Object.entries(groupData.messages).forEach(([msgId, msg]) => {
        if (!msg.replyTo) return;
        if (msg.replyTo.nickname !== myNickname) return;
        if (msg.nickname === myNickname) return;

        const notificationKey = "group_reply_" + groupName + "_" + msg.timestamp;
        if (lastNotifiedMessages[notificationKey]) return;

        let preview = "New reply";
        if (msg.type === "image") preview = "📷 Photo";
        else if (msg.type === "gif") preview = "🎯 GIF";
        else if (msg.type === "text" && msg.text) {
          preview = msg.text.length > 40
            ? msg.text.substring(0, 40) + "..."
            : msg.text;
        }

        toastQueue.push({
          senderName: msg.nickname,
          message: preview,
          redirectUrl: "/chat/group.html?group=" + encodeURIComponent(groupName),
          type: "reply",
          timestamp: msg.timestamp
        });

        lastNotifiedMessages[notificationKey] = true;
        localStorage.setItem(
          "lastNotifiedMessages",
          JSON.stringify(lastNotifiedMessages)
        );

        processToastQueue();
      });
    });
  }, (error) => {
    console.error("Group reply listener error:", error);
  });

  // ─── Toast processor ─────────────────────────────────────────────
  function processToastQueue() {
    soundMuted = localStorage.getItem("soundMuted") === "true";
    notificationOff = localStorage.getItem("notificationOff") === "true";

    notifySound.muted = soundMuted;

    if (notificationOff) return;
    if (toastShowing) return;
    if (toastQueue.length === 0) return;

    toastShowing = true;
    const data = toastQueue.shift();

    const shortMessage =
      data.message.length > 40
        ? data.message.substring(0, 40) + "..."
        : data.message;

    // Icon: reply arrow for group replies, chat bubble for DMs
    if (data.type === "reply") {
      toastIconWrapper.style.background = "#5b9bd5";
      toastIcon.setAttribute("viewBox", "0 0 24 24");
      toastIcon.querySelector("path").setAttribute("d", REPLY_ICON_PATH);

      toastName.textContent = data.senderName + " replied to you";
    } else {
      toastIconWrapper.style.background = "#25D366";
      toastIcon.querySelector("path").setAttribute("d", DM_ICON_PATH);

      toastName.textContent = data.senderName;
    }

    toastMessage.textContent = shortMessage;

    if (!soundMuted) {
      notifySound.currentTime = 0;
      notifySound.play().catch(() => {});
    }

    toast.style.top = "20px";

    toastViewBtn.onclick = function () {
      window.location.href = data.redirectUrl;
    };

    setTimeout(function () {
      toast.style.top = "-120px";
      setTimeout(function () {
        toastShowing = false;
        processToastQueue();
      }, 400);
    }, 5000);
  }
});
</script>
