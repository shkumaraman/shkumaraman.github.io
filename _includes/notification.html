<div id="messageToast"
  style="position: fixed; top: -120px; left: 50%; transform: translateX(-50%); background: #121212; color: #fff; padding: 14px 20px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; z-index: 10000; transition: top 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55), transform 0.3s ease; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); width: 90%; max-width: 500px; border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);">
  <div style="display: flex; align-items: center; gap: 14px; flex: 1;">
    <div id="toastIconWrapper"
      style="width: 40px; height: 40px; border-radius: 50%; background: #25D366; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
      <svg id="toastIcon" style="width: 18px; height: 18px; fill: white;" viewBox="0 0 24 24">
        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z" />
      </svg>
    </div>
    <div style="display: flex; flex-direction: column;">
      <span id="toastName" style="font-size: 14px; font-weight: 600; color: #ffffff;"></span>
      <span id="toastMessage" style="font-size: 13px; color: #cccccc; margin-top: 2px; line-height: 1.3;"></span>
    </div>
  </div>
  <button id="toastViewBtn"
    style="background: #25D366; border: none; color: #fff; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; flex-shrink: 0;">View</button>
</div>

<div id="callToast"
  style="position: fixed; top: -150px; left: 50%; transform: translateX(-50%); background: #1a1a1e; color: #fff; padding: 16px 20px; border-radius: 16px; display: flex; flex-direction: column; gap: 12px; z-index: 10001; transition: top 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6); width: 90%; max-width: 400px; border: 1px solid rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);">
  <div style="display: flex; align-items: center; gap: 14px;">
    <div id="callToastAvatar"
      style="width: 45px; height: 45px; border-radius: 50%; background: #ff6b4a; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; flex-shrink: 0;">
      ?</div>
    <div style="display: flex; flex-direction: column; flex: 1;">
      <span id="callToastName" style="font-size: 16px; font-weight: 600; color: #ffffff;"></span>
      <span id="callToastType" style="font-size: 13px; color: #25D366; margin-top: 2px;">Incoming Call...</span>
    </div>
  </div>
  <div style="display: flex; gap: 10px; width: 100%;">
    <button id="callToastRejectBtn"
      style="flex: 1; background: #FF3B30; border: none; color: #fff; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 14px;"><i
        class="fas fa-phone-slash"></i> Decline</button>
    <button id="callToastAcceptBtn"
      style="flex: 1; background: #25D366; border: none; color: #fff; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 14px;"><i
        class="fa-solid fa-phone"></i> Accept</button>
  </div>
</div>

<script type="module">
  import { initializeApp, getApp, getApps } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, remove, update } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

  document.addEventListener("DOMContentLoaded", function () {
    const firebaseConfig = { databaseURL: "https://talkrush-76259-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApp();
    const db = getDatabase(app);
    const myNickname = localStorage.getItem("talkrush_nickname");
    if (!myNickname) return;

    window.firebaseDB = db;

    const toast = document.getElementById("messageToast");
    const toastName = document.getElementById("toastName");
    const toastMessage = document.getElementById("toastMessage");
    const toastViewBtn = document.getElementById("toastViewBtn");
    const toastIcon = document.getElementById("toastIcon");
    const toastIconWrapper = document.getElementById("toastIconWrapper");

    const notifySound = new Audio("/assets/notify.mp3");
    let soundMuted = localStorage.getItem("soundMuted") === "true";
    let notificationOff = localStorage.getItem("notificationOff") === "true";
    notifySound.muted = soundMuted;

    let lastNotifiedMessages = JSON.parse(localStorage.getItem("lastNotifiedMessages") || "{}");
    let toastQueue = [];
    let toastShowing = false;
    const DM_ICON_PATH = "M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z";
    const REPLY_ICON_PATH = "M10 9V5l-7 7 7 7v-4.1c5 0 8.5 1.6 11 5.1-1-5-4-10-11-11z";

    function getFriendNickname(friend) { return friend.nickname1 === myNickname ? friend.nickname2 : friend.nickname2 === myNickname ? friend.nickname1 : null; }
    function getLastMessageFromFriend(friend) {
      if (!friend.messages) return null;
      const msgs = Object.values(friend.messages).sort((a, b) => b.timestamp - a.timestamp);
      if (msgs.length === 0 || msgs[0].nickname === myNickname) return null;
      let text = msgs[0].type === "image" ? "📷 Photo" : msgs[0].type === "gif" ? "🎯 GIF" : msgs[0].text;
      return { text, timestamp: msgs[0].timestamp };
    }

    onValue(ref(db, "friends"), (snap) => {
      const data = snap.val();
      if (!data) return;
      Object.entries(data).forEach(([chatId, friend]) => {
        const friendNick = getFriendNickname(friend);
        if (!friendNick) return;
        const lastMsg = getLastMessageFromFriend(friend);
        if (!lastMsg) return;
        const key = chatId + "_" + lastMsg.timestamp;
        if (lastNotifiedMessages[chatId] === key) return;
        toastQueue.push({ senderName: friendNick, message: lastMsg.text, redirectUrl: "/chat/inbox.html", type: "dm", timestamp: lastMsg.timestamp });
        lastNotifiedMessages[chatId] = key;
        localStorage.setItem("lastNotifiedMessages", JSON.stringify(lastNotifiedMessages));
        processToastQueue();
      });
    });

    function processToastQueue() {
      if (toastShowing || toastQueue.length === 0) return;
      toastShowing = true;
      const data = toastQueue.shift();
      if (data.type === "reply") { toastIconWrapper.style.background = "#5b9bd5"; toastIcon.querySelector("path").setAttribute("d", REPLY_ICON_PATH); toastName.textContent = data.senderName + " replied to you"; }
      else { toastIconWrapper.style.background = "#25D366"; toastIcon.querySelector("path").setAttribute("d", DM_ICON_PATH); toastName.textContent = data.senderName; }
      toastMessage.textContent = data.message.length > 40 ? data.message.substring(0, 40) + "..." : data.message;
      if (!soundMuted) { notifySound.currentTime = 0; notifySound.play().catch(() => { }); }
      toast.style.top = "20px";
      toastViewBtn.onclick = () => window.location.href = data.redirectUrl;
      setTimeout(() => { toast.style.top = "-120px"; setTimeout(() => { toastShowing = false; processToastQueue(); }, 400); }, 5000);
    }

    const callToast = document.getElementById('callToast');
    window.callRingtone = new Audio('/assets/ringtone.mp3');
    window.callRingtone.loop = true;
    let isRinging = false;
    let wasRinging = false;

    const myCallRef = ref(db, 'calls/' + myNickname);
    onValue(myCallRef, (snapshot) => {
      const callData = snapshot.val();
      if (callData && callData.status === 'calling' && callData.receiver === myNickname) {
        if (isRinging) return;
        isRinging = true;
        wasRinging = true;

        document.getElementById('callToastName').innerText = callData.caller;
        document.getElementById('callToastAvatar').innerText = callData.caller.charAt(0).toUpperCase();
        document.getElementById('callToastType').innerText = `Incoming ${callData.type.charAt(0).toUpperCase() + callData.type.slice(1)} Call...`;
        callToast.style.top = '20px';
        window.callRingtone.play().catch(() => { });

        document.getElementById('callToastAcceptBtn').onclick = async () => {
          isRinging = false;
          wasRinging = false;
          callToast.style.top = '-150px';
          window.callRingtone.pause(); window.callRingtone.currentTime = 0;

          if (window.acceptIncomingCall) {
            const isCameraReady = await window.acceptIncomingCall(callData.caller, callData.type);

            if (isCameraReady) {
              const getPeerId = () => {
                return new Promise((resolve) => {
                  if (window.myCallPeer && window.myCallPeer.id) {
                    resolve(window.myCallPeer.id);
                  } else if (window.myCallPeer) {
                    window.myCallPeer.on('open', (id) => {
                      resolve(id);
                    });
                    setTimeout(() => resolve(null), 3000);
                  } else {
                    resolve(null);
                  }
                });
              };
              const myPeerId = await getPeerId() || ("user_" + myNickname.replace(/[^a-zA-Z0-9]/g, '_'));

              update(ref(db, `calls/${myNickname}`), {
                status: 'accepted',
                receiverPeerId: myPeerId
              });
            }
          }
        };

        document.getElementById('callToastRejectBtn').onclick = () => {
          isRinging = false;
          wasRinging = false;
          callToast.style.top = '-150px';
          window.callRingtone.pause(); window.callRingtone.currentTime = 0;
          remove(ref(db, `calls/${myNickname}`));
        };
      }
      else if (!callData || callData.status === 'ended' || callData.status === 'rejected') {
        if (wasRinging) {
          isRinging = false;
          wasRinging = false;
          callToast.style.top = '-150px';
          window.callRingtone.pause(); window.callRingtone.currentTime = 0;
        }
        if (window.forceEndCallUI) {
          window.forceEndCallUI();
        }
        if (callData && (callData.status === 'ended' || callData.status === 'rejected')) {
          remove(ref(db, 'calls/' + myNickname));
        }
      }
    });
  });
</script>
