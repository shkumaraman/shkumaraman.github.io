<div id="messageToast" style="position: fixed; top: -120px; left: 50%; transform: translateX(-50%); background: #121212; color: #fff; padding: 14px 20px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; z-index: 10000; transition: top 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55), transform 0.3s ease; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); width: 90%; max-width: 500px; border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);">
  <div style="display: flex; align-items: center; gap: 14px; flex: 1;">
    <div id="toastIconWrapper" style="width: 40px; height: 40px; border-radius: 50%; background: #25D366; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
      <svg id="toastIcon" style="width: 18px; height: 18px; fill: white;" viewBox="0 0 24 24">
        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
      </svg>
    </div>
    <div style="display: flex; flex-direction: column;">
      <span id="toastName" style="font-size: 14px; font-weight: 600; color: #ffffff;"></span>
      <span id="toastMessage" style="font-size: 13px; color: #cccccc; margin-top: 2px; line-height: 1.3;"></span>
    </div>
  </div>
  <button id="toastViewBtn" style="background: #25D366; border: none; color: #fff; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; flex-shrink: 0;">View</button>
</div>

<div id="callToast" style="position: fixed; top: -150px; left: 50%; transform: translateX(-50%); background: #1a1a1e; color: #fff; padding: 16px 20px; border-radius: 16px; display: flex; flex-direction: column; gap: 12px; z-index: 10001; transition: top 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6); width: 90%; max-width: 400px; border: 1px solid rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);">
  <div style="display: flex; align-items: center; gap: 14px;">
    <div id="callToastAvatar" style="width: 45px; height: 45px; border-radius: 50%; background: #ff6b4a; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; flex-shrink: 0;">?</div>
    <div style="display: flex; flex-direction: column; flex: 1;">
      <span id="callToastName" style="font-size: 16px; font-weight: 600; color: #ffffff;"></span>
      <span id="callToastType" style="font-size: 13px; color: #25D366; margin-top: 2px;">Incoming Call...</span>
    </div>
  </div>
  <div style="display: flex; gap: 10px; width: 100%;">
    <button id="callToastRejectBtn" style="flex: 1; background: #FF3B30; border: none; color: #fff; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 14px;"><i class="fas fa-phone-slash"></i> Decline</button>
    <button id="callToastAcceptBtn" style="flex: 1; background: #25D366; border: none; color: #fff; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 14px;"><i class="fas fa-phone"></i> Accept</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

document.addEventListener("DOMContentLoaded", function () {
  const firebaseConfig = { databaseURL: "https://talkrush-76259-default-rtdb.asia-southeast1.firebasedatabase.app/" };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const myNickname = localStorage.getItem("talkrush_nickname");
  if (!myNickname) return;

  const toast = document.getElementById("messageToast");
  const toastName = document.getElementById("toastName");
  const toastMessage = document.getElementById("toastMessage");
  const toastViewBtn = document.getElementById("toastViewBtn");
  const toastIcon = document.getElementById("toastIcon");
  const toastIconWrapper = document.getElementById("toastIconWrapper");

  if (!toast) return;

  const notifySound = new Audio("/assets/notify.mp3");
  notifySound.preload = "auto";

  let soundMuted = localStorage.getItem("soundMuted") === "true";
  let notificationOff = localStorage.getItem("notificationOff") === "true";
  notifySound.muted = soundMuted;

  let lastNotifiedMessages = JSON.parse(localStorage.getItem("lastNotifiedMessages") || "{}");
  let toastQueue = [];
  let toastShowing = false;

  const DM_ICON_PATH = "M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z";
  const REPLY_ICON_PATH = "M10 9V5l-7 7 7 7v-4.1c5 0 8.5 1.6 11 5.1-1-5-4-10-11-11z";

  function getFriendNickname(friend) {
    if (friend.nickname1 === myNickname) return friend.nickname2;
    if (friend.nickname2 === myNickname) return friend.nickname1;
    return null;
  }

  function getLastMessageFromFriend(friend) {
    if (!friend.messages) return null;
    const messages = Object.values(friend.messages);
    if (messages.length === 0) return null;
    messages.sort((a, b) => b.timestamp - a.timestamp);
    const latestMessage = messages[0];
    if (latestMessage.nickname === myNickname) return null;

    let text = "New message";
    if (latestMessage.type === "image") text = "📷 Photo";
    else if (latestMessage.type === "gif") text = "🎯 GIF";
    else if (latestMessage.type === "text") text = latestMessage.text;
    return { text: text, timestamp: latestMessage.timestamp };
  }

  onValue(ref(db, "friends"), (snapshot) => {
    const data = snapshot.val();
    if (!data) return;
    Object.entries(data).forEach(([chatId, friend]) => {
      if (friend.nickname1 !== myNickname && friend.nickname2 !== myNickname) return;
      const friendNickname = getFriendNickname(friend);
      if (!friendNickname) return;
      const lastMessage = getLastMessageFromFriend(friend);
      if (!lastMessage) return;

      const notificationKey = chatId + "_" + lastMessage.timestamp;
      if (lastNotifiedMessages[chatId] === notificationKey) return;

      toastQueue.push({ senderName: friendNickname, message: lastMessage.text, redirectUrl: "/chat/inbox.html", type: "dm", timestamp: lastMessage.timestamp });
      lastNotifiedMessages[chatId] = notificationKey;
      localStorage.setItem("lastNotifiedMessages", JSON.stringify(lastNotifiedMessages));
      processToastQueue();
    });
  });

  onValue(ref(db, "groups"), (snapshot) => {
    const groupsData = snapshot.val();
    if (!groupsData) return;
    Object.entries(groupsData).forEach(([groupName, groupData]) => {
      if (!groupData.messages) return;
      Object.entries(groupData.messages).forEach(([msgId, msg]) => {
        if (!msg.replyTo || msg.replyTo.nickname !== myNickname || msg.nickname === myNickname) return;

        const notificationKey = "group_reply_" + groupName + "_" + msg.timestamp;
        if (lastNotifiedMessages[notificationKey]) return;

        let preview = "New reply";
        if (msg.type === "image") preview = "📷 Photo";
        else if (msg.type === "gif") preview = "🎯 GIF";
        else if (msg.type === "text" && msg.text) preview = msg.text.length > 40 ? msg.text.substring(0, 40) + "..." : msg.text;

        toastQueue.push({ senderName: msg.nickname, message: preview, redirectUrl: "/chat/group.html?group=" + encodeURIComponent(groupName), type: "reply", timestamp: msg.timestamp });
        lastNotifiedMessages[notificationKey] = true;
        localStorage.setItem("lastNotifiedMessages", JSON.stringify(lastNotifiedMessages));
        processToastQueue();
      });
    });
  });

  let startY = 0;
  let currentY = 0;
  let isDraggingToast = false;

  toast.addEventListener('touchstart', (e) => {
    startY = e.touches[0].clientY;
    isDraggingToast = true;
    toast.style.transition = 'none';
  }, { passive: true });

  toast.addEventListener('touchmove', (e) => {
    if (!isDraggingToast) return;
    currentY = e.touches[0].clientY;
    const deltaY = currentY - startY;
    if (deltaY < 0) toast.style.transform = `translateX(-50%) translateY(${deltaY}px)`;
  }, { passive: true });

  toast.addEventListener('touchend', () => {
    if (!isDraggingToast) return;
    isDraggingToast = false;
    toast.style.transition = 'top 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55), transform 0.3s ease';
    if (currentY - startY < -40) dismissToast();
    else toast.style.transform = 'translateX(-50%)';
  });

  function dismissToast() {
    toast.style.top = "-120px";
    toast.style.transform = 'translateX(-50%)';
    setTimeout(() => {
      toastShowing = false;
      processToastQueue();
    }, 400);
  }

  function processToastQueue() {
    soundMuted = localStorage.getItem("soundMuted") === "true";
    notificationOff = localStorage.getItem("notificationOff") === "true";
    notifySound.muted = soundMuted;

    if (notificationOff || toastShowing || toastQueue.length === 0) return;
    toastShowing = true;
    const data = toastQueue.shift();

    const shortMessage = data.message.length > 40 ? data.message.substring(0, 40) + "..." : data.message;
    if (data.type === "reply") {
      toastIconWrapper.style.background = "#5b9bd5";
      toastIcon.setAttribute("viewBox", "0 0 24 24");
      toastIcon.querySelector("path").setAttribute("d", REPLY_ICON_PATH);
      toastName.textContent = data.senderName + " replied to you";
    } else {
      toastIconWrapper.style.background = "#25D366";
      toastIcon.querySelector("path").setAttribute("d", DM_ICON_PATH);
      toastName.textContent = data.senderName;
    }

    toastMessage.textContent = shortMessage;
    if (!soundMuted) {
      notifySound.currentTime = 0;
      notifySound.play().catch(() => {});
    }

    toast.style.top = "20px";
    toast.style.transform = 'translateX(-50%)';
    toastViewBtn.onclick = () => window.location.href = data.redirectUrl;

    clearTimeout(toast.dataset.timeoutId);
    toast.dataset.timeoutId = setTimeout(dismissToast, 5000);
  }
});
</script>

<script>
  window.callRingtone = new Audio('/assets/ringtone.mp3');
  window.callRingtone.loop = true;

  window.showCallNotification = function(callerName, callType, onAccept, onReject) {
    const callToast = document.getElementById('callToast');
    document.getElementById('callToastName').innerText = callerName;
    document.getElementById('callToastAvatar').innerText = callerName.charAt(0).toUpperCase();
    document.getElementById('callToastType').innerText = `Incoming ${callType.charAt(0).toUpperCase() + callType.slice(1)} Call...`;
    
    callToast.style.top = '20px';
    window.callRingtone.play().catch(()=>{});

    document.getElementById('callToastAcceptBtn').onclick = () => {
      hideCallNotification();
      if(onAccept) onAccept();
    };

    document.getElementById('callToastRejectBtn').onclick = () => {
      hideCallNotification();
      if(onReject) onReject();
    };
  };

  window.hideCallNotification = function() {
    const callToast = document.getElementById('callToast');
    callToast.style.top = '-150px';
    window.callRingtone.pause();
    window.callRingtone.currentTime = 0;
  };
</script>
