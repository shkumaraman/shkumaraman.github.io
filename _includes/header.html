<style>
:root {
  --dark-surface: #111114;
  --dark-border: rgba(255,255,255,0.06);
  --dark-text: #fff;
  --dark-icon: #aaa;
  --dark-icon-hover: rgba(255,255,255,0.1);
  --light-surface: #ffffff;
  --light-border: rgba(0,0,0,0.1);
  --light-text: #111;
  --light-icon: #555;
  --light-icon-hover: rgba(0,0,0,0.07);
}

.header {
  position: fixed !important;
  top: 0;
  left: 0;
  width: 100%;
  height: 50px;
  background: var(--dark-surface);
  padding: 8px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  border-bottom: 0.5px solid var(--dark-border);
  z-index: 10000;
}

body.light-mode .header {
  background: var(--light-surface);
  border-bottom: 0.5px solid var(--light-border);
}

.back-btn {
  background: transparent;
  border: none;
  color: var(--dark-icon);
  font-size: 20px;
  cursor: pointer;
  width: 34px;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
}

.back-btn:hover {
  background: var(--dark-icon-hover);
  color: var(--dark-text);
}

body.light-mode .back-btn {
  color: var(--light-icon);
}

body.light-mode .back-btn:hover {
  background: var(--light-icon-hover);
  color: var(--light-text);
}
</style>

<header class="header">
    <button class="back-btn" onclick="goBack()">&#8592;</button>
</header>

<script>
function goBack() {
    window.history.back();
}
</script>
