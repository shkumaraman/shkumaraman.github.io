<style>
  #gw-floating-btn {
    position: fixed;
    bottom: 140px;
    right: 20px;
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: grab;
    box-shadow: 0 8px 20px rgba(79, 172, 254, 0.5);
    z-index: 10000;
    transition: transform 0.2s, box-shadow 0.2s;
    border: none;
    user-select: none;
  }
  #gw-floating-btn svg {
    width: 28px;
    height: 28px;
    fill: white;
  }
  #gw-floating-btn:active {
    cursor: grabbing;
    transform: scale(1.05);
    box-shadow: 0 12px 28px rgba(79, 172, 254, 0.7);
  }
  #gw-floating-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 10px 25px rgba(79, 172, 254, 0.6);
  }

  #gw-modal {
    display: none;
    position: fixed;
    bottom: 200px;
    right: 20px;
    width: 340px;
    background: rgba(30, 30, 30, 0.85);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 16px;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
    z-index: 10001;
    overflow: hidden;
    color: #fff;
    transition: all 0.3s ease;
  }
  body.light-mode #gw-modal {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(16px);
    border-color: rgba(0, 0, 0, 0.1);
    color: #222;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
  }

  .gw-header {
    display: flex;
    align-items: center;
    background: rgba(0, 0, 0, 0.4);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    padding-right: 8px;
  }
  body.light-mode .gw-header {
    background: rgba(255, 255, 255, 0.6);
    border-bottom-color: rgba(0, 0, 0, 0.05);
  }
  .gw-tab {
    flex: 1;
    padding: 14px 10px;
    text-align: center;
    background: none;
    border: none;
    color: inherit;
    cursor: pointer;
    font-weight: 600;
    outline: none;
    opacity: 0.7;
    transition: all 0.3s;
    letter-spacing: 0.3px;
  }
  .gw-tab.active {
    opacity: 1;
    border-bottom: 2px solid #4facfe;
    background: rgba(79, 172, 254, 0.1);
  }
  .gw-close {
    background: none;
    border: none;
    color: inherit;
    font-size: 22px;
    cursor: pointer;
    padding: 8px 12px;
    opacity: 0.7;
    transition: opacity 0.3s;
    line-height: 1;
  }
  .gw-close:hover {
    opacity: 1;
  }

  .gw-content {
    padding: 15px;
    display: none;
  }
  .gw-content.active {
    display: block;
  }

  #gw-canvas {
    background: #fff;
    border: 2px solid rgba(255, 255, 255, 0.2);
    border-radius: 12px;
    cursor: crosshair;
    width: 100%;
    height: 250px;
    touch-action: none;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.1);
  }
  .gw-controls {
    margin-top: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .gw-btn {
    background: rgba(255, 255, 255, 0.12);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.2);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.2s;
    backdrop-filter: blur(4px);
  }
  body.light-mode .gw-btn {
    background: rgba(0, 0, 0, 0.06);
    color: #222;
    border-color: rgba(0, 0, 0, 0.15);
  }
  .gw-btn:hover {
    background: rgba(255, 255, 255, 0.25);
  }
  body.light-mode .gw-btn:hover {
    background: rgba(0, 0, 0, 0.12);
  }
  #gw-color-picker {
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    cursor: pointer;
    background: transparent;
  }

  #gw-ttt-board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-bottom: 16px;
  }
  .gw-cell {
    background: rgba(255, 255, 255, 0.08);
    height: 85px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 38px;
    font-weight: 700;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    backdrop-filter: blur(4px);
  }
  body.light-mode .gw-cell {
    background: rgba(0, 0, 0, 0.04);
  }
  .gw-cell:hover {
    background: rgba(255, 255, 255, 0.18);
    transform: scale(1.02);
  }
  body.light-mode .gw-cell:hover {
    background: rgba(0, 0, 0, 0.08);
  }
  .gw-ttt-status {
    text-align: center;
    font-weight: 600;
    margin-bottom: 12px;
    font-size: 15px;
  }

  @media (max-width: 600px) {
    #gw-modal {
      width: 92%;
      left: 4%;
      right: 4%;
      bottom: 150px;
    }
  }
</style>

<div id="gw-floating-btn">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M6 11h2V9h2V7H8V5H6v2H4v2h2v2zm10-4h-2v2h2v2h2V9h2V7h-2V5h-2v2zM3 17h4v-2H3v2zm14 0h4v-2h-4v2zm-7-1c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
    <path fill="none" d="M0 0h24v24H0z"/>
  </svg>
</div>

<div id="gw-modal">
  <div class="gw-header">
    <button class="gw-tab active" data-target="gw-draw-view">✏️ Draw</button>
    <button class="gw-tab" data-target="gw-ttt-view">❌⭕ Tic-Tac-Toe</button>
    <button class="gw-close" id="gw-modal-close">✕</button>
  </div>

  <div id="gw-draw-view" class="gw-content active">
    <canvas id="gw-canvas"></canvas>
    <div class="gw-controls">
      <input type="color" id="gw-color-picker" value="#4facfe">
      <button class="gw-btn" id="gw-clear-btn">Clear Canvas</button>
    </div>
  </div>

  <div id="gw-ttt-view" class="gw-content">
    <div class="gw-ttt-status" id="gw-ttt-status">Your turn! (X)</div>
    <div id="gw-ttt-board">
      <div class="gw-cell" data-index="0"></div><div class="gw-cell" data-index="1"></div><div class="gw-cell" data-index="2"></div>
      <div class="gw-cell" data-index="3"></div><div class="gw-cell" data-index="4"></div><div class="gw-cell" data-index="5"></div>
      <div class="gw-cell" data-index="6"></div><div class="gw-cell" data-index="7"></div><div class="gw-cell" data-index="8"></div>
    </div>
    <div class="gw-controls" style="justify-content: center;">
      <button class="gw-btn" id="gw-ttt-reset">Restart Game</button>
    </div>
  </div>
</div>

<script>
  (function() {
    const btn = document.getElementById('gw-floating-btn');
    const modal = document.getElementById('gw-modal');
    const closeBtn = document.getElementById('gw-modal-close');
    const tabs = document.querySelectorAll('.gw-tab');
    const contents = document.querySelectorAll('.gw-content');

    let isDragging = false;
    let startX, startY, startLeft, startTop;

    function onDragStart(e) {
      e.preventDefault();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      isDragging = true;
      startX = clientX;
      startY = clientY;
      const rect = btn.getBoundingClientRect();
      startLeft = rect.left;
      startTop = rect.top;
      btn.style.transition = 'none';
      btn.style.bottom = 'auto';
      btn.style.right = 'auto';
      btn.style.left = startLeft + 'px';
      btn.style.top = startTop + 'px';
      btn.style.cursor = 'grabbing';
    }

    function onDragMove(e) {
      if (!isDragging) return;
      e.preventDefault();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      const deltaX = clientX - startX;
      const deltaY = clientY - startY;
      let newLeft = startLeft + deltaX;
      let newTop = startTop + deltaY;
      const maxX = window.innerWidth - btn.offsetWidth;
      const maxY = window.innerHeight - btn.offsetHeight;
      newLeft = Math.min(Math.max(newLeft, 0), maxX);
      newTop = Math.min(Math.max(newTop, 0), maxY);
      btn.style.left = newLeft + 'px';
      btn.style.top = newTop + 'px';
    }

    function onDragEnd() {
      if (!isDragging) return;
      isDragging = false;
      btn.style.cursor = 'grab';
      btn.style.transition = 'transform 0.2s, box-shadow 0.2s';
    }

    btn.addEventListener('mousedown', onDragStart);
    btn.addEventListener('touchstart', onDragStart, { passive: false });
    window.addEventListener('mousemove', onDragMove);
    window.addEventListener('touchmove', onDragMove, { passive: false });
    window.addEventListener('mouseup', onDragEnd);
    window.addEventListener('touchend', onDragEnd);

    btn.addEventListener('click', (e) => {
      if (isDragging) return;
      modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
      if (modal.style.display === 'block') initCanvas();
    });

    closeBtn.addEventListener('click', () => {
      modal.style.display = 'none';
    });

    tabs.forEach(tab => {
      tab.addEventListener('click', (e) => {
        tabs.forEach(t => t.classList.remove('active'));
        contents.forEach(c => c.classList.remove('active'));
        e.target.classList.add('active');
        document.getElementById(e.target.dataset.target).classList.add('active');
      });
    });

    function sendGameData(payload) {
      if (window.gameWebRTCConn && window.gameWebRTCConn.open) {
        window.gameWebRTCConn.send({ type: "game_widget", payload: payload });
      }
    }

    window.addEventListener('webrtc_data_received', (e) => {
      const data = e.detail;
      if (data && data.type === 'game_widget') {
        const payload = data.payload;
        if (payload.game === 'draw') handleIncomingDraw(payload);
        if (payload.game === 'ttt') handleIncomingTTT(payload);
      }
    });

    const canvas = document.getElementById('gw-canvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;
    let lastX = 0, lastY = 0;

    function initCanvas() {
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.lineWidth = 3;
    }

    window.addEventListener('resize', initCanvas);

    function draw(x0, y0, x1, y1, color, send = true) {
      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.lineTo(x1, y1);
      ctx.strokeStyle = color;
      ctx.stroke();
      ctx.closePath();
      if (send) {
        sendGameData({
          game: 'draw', action: 'line', color: color,
          x0: x0 / canvas.width, y0: y0 / canvas.height,
          x1: x1 / canvas.width, y1: y1 / canvas.height
        });
      }
    }

    function getMousePos(e) {
      const rect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: clientX - rect.left, y: clientY - rect.top };
    }

    const startDraw = (e) => {
      e.preventDefault();
      isDrawing = true;
      const pos = getMousePos(e);
      lastX = pos.x; lastY = pos.y;
    };

    const doDraw = (e) => {
      if (!isDrawing) return;
      e.preventDefault();
      const pos = getMousePos(e);
      const color = document.getElementById('gw-color-picker').value;
      draw(lastX, lastY, pos.x, pos.y, color, true);
      lastX = pos.x; lastY = pos.y;
    };

    const stopDraw = () => { isDrawing = false; };

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', doDraw);
    canvas.addEventListener('mouseup', stopDraw);
    canvas.addEventListener('mouseout', stopDraw);
    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', doDraw, { passive: false });
    canvas.addEventListener('touchend', stopDraw);

    document.getElementById('gw-clear-btn').addEventListener('click', () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      sendGameData({ game: 'draw', action: 'clear' });
    });

    function handleIncomingDraw(data) {
      if (data.action === 'line') {
        const x0 = data.x0 * canvas.width;
        const y0 = data.y0 * canvas.height;
        const x1 = data.x1 * canvas.width;
        const y1 = data.y1 * canvas.height;
        draw(x0, y0, x1, y1, data.color, false);
      } else if (data.action === 'clear') {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
    }

    let board = ["", "", "", "", "", "", "", "", ""];
    const cells = document.querySelectorAll('.gw-cell');
    const statusText = document.getElementById('gw-ttt-status');

    function checkWin(b) {
      const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
      for (let w of wins) {
        if (b[w[0]] && b[w[0]] === b[w[1]] && b[w[0]] === b[w[2]]) return b[w[0]];
      }
      return b.includes("") ? null : "Tie";
    }

    function updateBoardUI() {
      cells.forEach((cell, i) => {
        cell.textContent = board[i];
        cell.style.color = board[i] === 'X' ? '#ff4b2b' : (board[i] === 'O' ? '#4CAF50' : '');
      });
      const winner = checkWin(board);
      if (winner) {
        statusText.textContent = winner === "Tie" ? "It's a Tie! 🤝" : `${winner} Wins! 🎉`;
      } else {
        statusText.textContent = "Game on!";
      }
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = cell.dataset.index;
        if (board[i] !== "" || checkWin(board)) return;
        board[i] = "X";
        updateBoardUI();
        sendGameData({ game: 'ttt', action: 'move', index: i });
      });
    });

    document.getElementById('gw-ttt-reset').addEventListener('click', () => {
      board = ["", "", "", "", "", "", "", "", ""];
      updateBoardUI();
      statusText.textContent = "Game Restarted!";
      sendGameData({ game: 'ttt', action: 'reset' });
    });

    function handleIncomingTTT(data) {
      if (data.action === 'move') {
        board[data.index] = "O";
        updateBoardUI();
      } else if (data.action === 'reset') {
        board = ["", "", "", "", "", "", "", "", ""];
        updateBoardUI();
        statusText.textContent = "Opponent restarted the game!";
      }
    }
  })();
</script>
