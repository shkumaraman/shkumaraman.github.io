<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ludo Classic</title>
  <style>
    :root {
      --clr-red:          #c62828;
      --clr-red-dark:     #b71c1c;
      --clr-red-light:    #ff8a80;

      --clr-green:        #2e7d32;
      --clr-green-dark:   #1b5e20;
      --clr-green-light:  #69f0ae;

      --clr-yellow:       #f9a825;
      --clr-yellow-dark:  #e65100;
      --clr-yellow-light: #ffe57f;

      --clr-blue:         #1565c0;
      --clr-blue-dark:    #0d47a1;
      --clr-blue-light:   #82b1ff;

      --clr-path:   #f5f0e8;
      --clr-bg:     #1a2535;
      --clr-board:  #0d1620;
      --clr-wrap:   #20303f;
      --clr-border: #3a5570;

      --dice-size: 38px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--clr-bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      gap: 14px;
      padding: 20px;
    }

    h1 {
      color: #e8d5b0;
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 6px;
      text-transform: uppercase;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }

    .board-wrap {
      background: var(--clr-wrap);
      padding: 14px;
      border-radius: 20px;
      box-shadow: 0 24px 48px rgba(0,0,0,0.8), inset 0 0 0 2px var(--clr-border);
    }

    .ludo-board {
      display: grid;
      grid-template-columns: repeat(15, 48px);
      grid-template-rows: repeat(15, 48px);
      gap: 3px;
      background: var(--clr-board);
      padding: 3px;
      border-radius: 10px;
      position: relative;
    }

    .cell {
      width: 48px; height: 48px;
      border-radius: 6px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .f-r { background: var(--clr-red);    box-shadow: inset 0 0 0 1px var(--clr-red-light); }
    .f-g { background: var(--clr-green);  box-shadow: inset 0 0 0 1px var(--clr-green-light); }
    .f-y { background: var(--clr-yellow); box-shadow: inset 0 0 0 1px var(--clr-yellow-light); }
    .f-b { background: var(--clr-blue);   box-shadow: inset 0 0 0 1px var(--clr-blue-light); }

    .s-r { background: var(--clr-red)    !important; box-shadow: inset 0 0 0 2px var(--clr-red-light)    !important; }
    .s-g { background: var(--clr-green)  !important; box-shadow: inset 0 0 0 2px var(--clr-green-light)  !important; }
    .s-y { background: var(--clr-yellow) !important; box-shadow: inset 0 0 0 2px var(--clr-yellow-light) !important; }
    .s-b { background: var(--clr-blue)   !important; box-shadow: inset 0 0 0 2px var(--clr-blue-light)   !important; }

    .p { background: var(--clr-path); }

    .safe { background: var(--clr-path); }
    .safe::after {
      content: '★';
      font-size: 15px;
      color: #aaa;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    /* ── WIN HOUSE ── */
    .win-house {
      grid-column: 7 / 10;
      grid-row: 7 / 10;
      width: 150px; height: 150px;
      border-radius: 10px;
      overflow: hidden;
      z-index: 10;
      background: var(--clr-path);
      box-shadow: 0 0 0 3px var(--clr-board), 0 4px 16px rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
    }
    .win-house img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* ── HOME CARDS ── */
    .home-card {
      border-radius: 12px;
      position: relative;
      z-index: 5;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 4px;
      padding: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5), inset 0 0 0 2px rgba(255,255,255,0.15);
    }

    .home-card.red    { background: linear-gradient(135deg, var(--clr-red-dark),    var(--clr-red));    grid-column: 1/7;   grid-row: 1/7; }
    .home-card.green  { background: linear-gradient(135deg, var(--clr-green-dark),  var(--clr-green));  grid-column: 10/16; grid-row: 1/7; }
    .home-card.yellow { background: linear-gradient(135deg, var(--clr-yellow-dark), var(--clr-yellow)); grid-column: 1/7;   grid-row: 10/16; }
    .home-card.blue   { background: linear-gradient(135deg, var(--clr-blue-dark),   var(--clr-blue));   grid-column: 10/16; grid-row: 10/16; }

    .home-cell {
      border-radius: 4px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Center dice cell spans 2x2 in the middle of 4x4 grid (cols 2-3, rows 2-3) */
    .dice-cell {
      grid-column: 2 / 4;
      grid-row: 2 / 4;
      background: transparent;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    /* ── 3D DICE ── */
    .dice-scene {
      width: var(--dice-size);
      height: var(--dice-size);
      perspective: 160px;
      cursor: pointer;
    }

    .dice-cube {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transform: rotateX(-20deg) rotateY(30deg);
      transition: transform 0.08s ease;
    }

    .dice-cube.spinning {
      animation: diceRoll 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    @keyframes diceRoll {
      0%   { transform: rotateX(-20deg) rotateY(30deg); }
      20%  { transform: rotateX(200deg) rotateY(150deg) rotateZ(60deg); }
      50%  { transform: rotateX(500deg) rotateY(400deg) rotateZ(180deg); }
      80%  { transform: rotateX(680deg) rotateY(560deg) rotateZ(240deg); }
      100% { transform: var(--dice-final); }
    }

    .dice-face {
      position: absolute;
      width: var(--dice-size);
      height: var(--dice-size);
      border-radius: 6px;
      background: #f5f0e8;
      border: 2px solid rgba(0,0,0,0.15);
      display: grid;
      padding: 5px;
      box-shadow: inset 0 0 6px rgba(0,0,0,0.12);
    }

    /* Face positions */
    .face-1 { transform: translateZ(calc(var(--dice-size) / 2)); }
    .face-6 { transform: rotateY(180deg) translateZ(calc(var(--dice-size) / 2)); }
    .face-2 { transform: rotateY(90deg)  translateZ(calc(var(--dice-size) / 2)); }
    .face-5 { transform: rotateY(-90deg) translateZ(calc(var(--dice-size) / 2)); }
    .face-3 { transform: rotateX(-90deg) translateZ(calc(var(--dice-size) / 2)); }
    .face-4 { transform: rotateX(90deg)  translateZ(calc(var(--dice-size) / 2)); }

    /* Dot layout grids per face */
    .face-1 { grid-template-areas: '. . .' '. c .' '. . .'; }
    .face-2 { grid-template-areas: '. . a' '. . .' 'b . .'; }
    .face-3 { grid-template-areas: '. . a' '. c .' 'b . .'; }
    .face-4 { grid-template-areas: 'a . b' '. . .' 'c . d'; }
    .face-5 { grid-template-areas: 'a . b' '. c .' 'd . e'; }
    .face-6 { grid-template-areas: 'a . b' 'c . d' 'e . f'; }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #1a1a1a;
      box-shadow: 0 1px 2px rgba(0,0,0,0.4);
      justify-self: center;
      align-self: center;
    }

    .face-1 .dot:nth-child(1) { grid-area: c; }
    .face-2 .dot:nth-child(1) { grid-area: a; }
    .face-2 .dot:nth-child(2) { grid-area: b; }
    .face-3 .dot:nth-child(1) { grid-area: a; }
    .face-3 .dot:nth-child(2) { grid-area: c; }
    .face-3 .dot:nth-child(3) { grid-area: b; }
    .face-4 .dot:nth-child(1) { grid-area: a; }
    .face-4 .dot:nth-child(2) { grid-area: b; }
    .face-4 .dot:nth-child(3) { grid-area: c; }
    .face-4 .dot:nth-child(4) { grid-area: d; }
    .face-5 .dot:nth-child(1) { grid-area: a; }
    .face-5 .dot:nth-child(2) { grid-area: b; }
    .face-5 .dot:nth-child(3) { grid-area: c; }
    .face-5 .dot:nth-child(4) { grid-area: d; }
    .face-5 .dot:nth-child(5) { grid-area: e; }
    .face-6 .dot:nth-child(1) { grid-area: a; }
    .face-6 .dot:nth-child(2) { grid-area: b; }
    .face-6 .dot:nth-child(3) { grid-area: c; }
    .face-6 .dot:nth-child(4) { grid-area: d; }
    .face-6 .dot:nth-child(5) { grid-area: e; }
    .face-6 .dot:nth-child(6) { grid-area: f; }

    /* ── TOKENS ── */
    .token {
      width: 70%; height: 70%;
      border-radius: 50%;
      box-shadow: 0 3px 7px rgba(0,0,0,0.7), inset 0 2px 3px rgba(255,255,255,0.45);
      border: 2px solid rgba(255,255,255,0.5);
    }
    .t-r { background: radial-gradient(circle at 35% 35%, var(--clr-red-light),    var(--clr-red-dark)); }
    .t-g { background: radial-gradient(circle at 35% 35%, var(--clr-green-light),  var(--clr-green-dark)); }
    .t-y { background: radial-gradient(circle at 35% 35%, var(--clr-yellow-light), var(--clr-yellow-dark)); }
    .t-b { background: radial-gradient(circle at 35% 35%, var(--clr-blue-light),   var(--clr-blue-dark)); }
  </style>
</head>
<body>

<!-- Dice roll sound — replace src with your sound file path -->
<audio id="dice-sound" src="dice-roll.mp3" preload="auto"></audio>

<h1>◈ Ludo Classic ◈</h1>

<div class="board-wrap">
  <div class="ludo-board" id="board">

    <div class="win-house">
      <img
        src="https://images.unsplash.com/photo-1567427017947-545c5f8d16ad?w=200&h=200&fit=crop&crop=center"
        alt="Win"
        onerror="this.replaceWith(document.createTextNode('🏆'))">
    </div>

    <div class="home-card red"    id="card-r"></div>
    <div class="home-card green"  id="card-g"></div>
    <div class="home-card yellow" id="card-y"></div>
    <div class="home-card blue"   id="card-b"></div>

  </div>
</div>

<script>
/* ── BOARD CELLS ── */
const SIZE = 15;
const SAFE = new Set(['6,12','8,2','2,6','12,8']);

function isHomeQuadrant(r, c) {
  return (r <= 5 && c <= 5) || (r <= 5 && c >= 9) ||
         (r >= 9 && c <= 5) || (r >= 9 && c >= 9);
}
function isCenter(r, c) { return r >= 6 && r <= 8 && c >= 6 && c <= 8; }

function classOf(r, c) {
  const k = r + ',' + c;
  if (r === 6  && c === 1)  return 'p s-r';
  if (r === 1  && c === 8)  return 'p s-g';
  if (r === 8  && c === 13) return 'p s-b';
  if (r === 13 && c === 6)  return 'p s-y';
  if (r === 7 && c >= 1 && c <= 5)  return 'f-r';
  if (c === 7 && r >= 1 && r <= 5)  return 'f-g';
  if (r === 7 && c >= 9 && c <= 13) return 'f-b';
  if (c === 7 && r >= 9 && r <= 13) return 'f-y';
  if (SAFE.has(k)) return 'safe';
  return 'p';
}

const board = document.getElementById('board');
for (let r = 0; r < SIZE; r++) {
  for (let c = 0; c < SIZE; c++) {
    if (isCenter(r, c) || isHomeQuadrant(r, c)) continue;
    const div = document.createElement('div');
    div.className = 'cell ' + classOf(r, c);
    div.style.gridColumn = c + 1;
    div.style.gridRow    = r + 1;
    board.appendChild(div);
  }
}

/* ── DICE FACE TRANSFORMS (front face = value shown) ── */
const FACE_TRANSFORMS = {
  1: 'rotateX(-20deg) rotateY(30deg)',
  2: 'rotateX(-20deg) rotateY(-90deg)',
  3: 'rotateX(90deg) rotateY(30deg)',
  4: 'rotateX(-90deg) rotateY(30deg)',
  5: 'rotateX(-20deg) rotateY(90deg)',
  6: 'rotateX(-20deg) rotateY(210deg)',
};

function makeDiceFace(n) {
  const face = document.createElement('div');
  face.className = `dice-face face-${n}`;
  for (let i = 0; i < n; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot';
    face.appendChild(dot);
  }
  return face;
}

function makeDice(cardId, tokenCls) {
  const card = document.getElementById(cardId);

  /* 4×4 = 16 cells; center 2×2 = dice-cell at positions we skip manually */
  /* We build cells in row-major order, inserting dice-cell for center */
  for (let i = 0; i < 16; i++) {
    const row = Math.floor(i / 4); // 0-3
    const col = i % 4;             // 0-3

    const isCenter2x2 = (row === 1 || row === 2) && (col === 1 || col === 2);

    if (isCenter2x2) continue; /* dice-cell will span these */

    const cell = document.createElement('div');
    cell.className = 'home-cell';

    /* Token corners: (0,0),(0,3),(3,0),(3,3) */
    if ((row === 0 || row === 3) && (col === 0 || col === 3)) {
      const t = document.createElement('div');
      t.className = 'token ' + tokenCls;
      cell.appendChild(t);
    }

    /* Place in correct grid position */
    cell.style.gridColumn = col + 1;
    cell.style.gridRow    = row + 1;
    card.appendChild(cell);
  }

  /* Dice cell: spans cols 2-3, rows 2-3 */
  const diceCell = document.createElement('div');
  diceCell.className = 'home-cell dice-cell';
  diceCell.style.gridColumn = '2 / 4';
  diceCell.style.gridRow    = '2 / 4';
  diceCell.style.flexDirection = 'column';
  diceCell.style.gap = '3px';

  /* Dice scene */
  const scene = document.createElement('div');
  scene.className = 'dice-scene';

  const cube = document.createElement('div');
  cube.className = 'dice-cube';
  cube.style.setProperty('--dice-final', FACE_TRANSFORMS[1]);

  for (let f = 1; f <= 6; f++) cube.appendChild(makeDiceFace(f));
  scene.appendChild(cube);

  diceCell.appendChild(scene);
  card.appendChild(diceCell);

  /* Click handler */
  let rolling = false;
  diceCell.addEventListener('click', () => {
    if (rolling) return;
    rolling = true;

    /* Play dice sound */
    const audio = document.getElementById('dice-sound');
    if (audio) { audio.currentTime = 0; audio.play().catch(() => {}); }

    const val = Math.floor(Math.random() * 6) + 1;
    cube.style.setProperty('--dice-final', FACE_TRANSFORMS[val]);
    cube.classList.remove('spinning');
    void cube.offsetWidth;
    cube.classList.add('spinning');

    cube.addEventListener('animationend', () => {
      cube.classList.remove('spinning');
      cube.style.transform = FACE_TRANSFORMS[val];
      rolling = false;
    }, { once: true });
  });
}

makeDice('card-r', 't-r');
makeDice('card-g', 't-g');
makeDice('card-y', 't-y');
makeDice('card-b', 't-b');
</script>
</body>
</html>
